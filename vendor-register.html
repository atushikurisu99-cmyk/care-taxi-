<!doctype html>
    <div class="field">
      <label>車両台数</label>
      <input id="cars" class="input">
    </div>

    <div class="field">
      <label>担当者名</label>
      <input id="staff" class="input">
    </div>

    <div class="field">
      <label>稼働開始時間</label>
      <input id="start" class="input" type="time">
    </div>

    <div class="field">
      <label>電話番号</label>
      <input id="tel" class="input">
    </div>

    <div class="field">
      <label>対応設備</label>
      <input id="equipment" class="input" placeholder="3件">
    </div>

    <div class="field">
      <label>対応エリア</label>
      <input id="area" class="input">
    </div>

  </div>

  <div class="footer">
    <button class="save" onclick="saveVendor()">協力行登録</button>
  </div>

</div>
</div>

<script>
function nowHeader(){
  const now=new Date();
  const week=['日','月','火','水','木','金','土'];
  document.getElementById('nowText').textContent=
    `${now.getMonth()+1}/${now.getDate()}（${week[now.getDay()]}） ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
}

function saveVendor(){
  const vendors=JSON.parse(localStorage.getItem('vendors')||'[]');

  vendors.push({
    id:Date.now(),
    name:document.getElementById('name').value,
    cars:document.getElementById('cars').value,
    staff:document.getElementById('staff').value,
    start:document.getElementById('start').value,
    tel:document.getElementById('tel').value,
    equipment:document.getElementById('equipment').value,
    area:document.getElementById('area').value
  });

  localStorage.setItem('vendors',JSON.stringify(vendors));

  location.href='settings.html';
}

nowHeader();
</script>
</body>
</html>
