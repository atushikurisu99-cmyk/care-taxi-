<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>患者マスター - ステマネ</title>
<style>
/* ━━━ リセット ━━━ */
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue","Yu Gothic",Meiryo,sans-serif;}

/* ━━━ カラー変数（既存ステマネ継承） ━━━ */
:root{
  --pc-primary:#178ea5;
  --pc-primary-dark:#00636b;
  --pc-primary-deep:#00484f;
  --pc-bg:#dcebf1;
  --pc-panel:#ffffff;
  --pc-line:#c8d7dd;
  --pc-text:#24333a;
  --pc-muted:#6f828a;
  --pc-warn:#fff3d6;
  --pc-danger:#ffe4e7;
  --pc-ok:#e4f5e3;
  --pc-blue:#e5f2fb;
}

/* ━━━ アプリ全体グリッド ━━━ */
body{
  background:var(--pc-bg);
  color:var(--pc-text);
}
#app{
  display:grid;
  grid-template-columns:220px 1fr 360px;
  grid-template-rows:68px 1fr 30px;
  width:100vw;
  height:100vh;
  overflow:hidden;
}

/* ━━━ サイドバー ━━━ */
.sidebar{
  grid-row:1/4;
  grid-column:1;
  background:linear-gradient(180deg,var(--pc-primary-dark),var(--pc-primary-deep));
  color:#fff;
  padding:22px 16px 18px;
  display:flex;
  flex-direction:column;
  gap:0;
  overflow:hidden;
}
.brand{display:flex;align-items:center;gap:10px;font-weight:900;font-size:17px;letter-spacing:.02em;white-space:nowrap;margin-bottom:24px;}
.brand-icon{width:34px;height:34px;border-radius:10px;background:#fff;color:var(--pc-primary-dark);display:grid;place-items:center;font-weight:900;font-size:16px;flex-shrink:0;}
.nav{display:flex;flex-direction:column;gap:4px;}
.nav-item{
  width:100%;height:42px;border:0;border-radius:8px;
  background:transparent;color:#fff;
  text-align:left;padding:0 14px;
  font-size:14px;font-weight:700;
  display:flex;align-items:center;gap:10px;
  cursor:pointer;white-space:nowrap;
}
.nav-item:hover{background:rgba(255,255,255,.12);}
.nav-item.active{background:rgba(255,255,255,.18);box-shadow:inset 0 0 0 1px rgba(255,255,255,.18);}
.sidebar-bottom{margin-top:auto;display:flex;flex-direction:column;gap:10px;}
.ipad-btn{
  height:42px;border:1px solid rgba(255,255,255,.45);border-radius:8px;
  background:rgba(255,255,255,.08);color:#fff;font-size:13px;font-weight:900;cursor:pointer;
}
.company{font-size:10px;font-weight:700;color:rgba(255,255,255,.65);line-height:1.6;}

/* ━━━ ヘッダー ━━━ */
.header{
  grid-column:2/4;grid-row:1;
  background:#fff;border-bottom:1px solid var(--pc-line);
  display:flex;align-items:center;gap:16px;padding:0 22px;
}
.header-title{font-size:18px;font-weight:900;line-height:1.1;}
.header-sub{font-size:12px;color:var(--pc-muted);font-weight:700;margin-top:3px;}
.header-search{
  margin-left:auto;
  width:min(380px,30vw);height:38px;
  border:1px solid var(--pc-line);border-radius:8px;
  background:#fff;padding:0 12px;
  font-size:14px;color:var(--pc-text);
  outline:none;
}
.header-search:focus{border-color:var(--pc-primary);}
.header-btn{
  height:36px;padding:0 16px;
  border:0;border-radius:8px;
  background:linear-gradient(90deg,var(--pc-primary-dark),var(--pc-primary));
  color:#fff;font-size:13px;font-weight:900;cursor:pointer;white-space:nowrap;
}

/* ━━━ メインエリア（一覧） ━━━ */
.main{
  grid-column:2;grid-row:2;
  overflow-y:auto;
  padding:24px 22px;
  background:var(--pc-bg);
}

/* ━━━ パネル共通 ━━━ */
.panel{
  background:#fff;
  border:1px solid var(--pc-line);
  border-radius:10px;
  box-shadow:0 2px 8px rgba(0,0,0,.05);
  overflow:hidden;
  margin-bottom:18px;
}
.panel-head{
  height:50px;padding:0 18px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--pc-line);
  font-size:15px;font-weight:900;
}
.panel-head-right{display:flex;align-items:center;gap:8px;}

/* ━━━ フィルターバー ━━━ */
.filter-bar{
  display:flex;align-items:center;gap:10px;
  padding:12px 18px;
  border-bottom:1px solid var(--pc-line);
  background:#f8fbfc;
  flex-wrap:wrap;
}
.filter-label{font-size:12px;font-weight:800;color:var(--pc-muted);}
.filter-select{
  height:30px;padding:0 10px;
  border:1px solid var(--pc-line);border-radius:6px;
  font-size:13px;color:var(--pc-text);background:#fff;cursor:pointer;
}
.filter-input{
  height:30px;padding:0 10px;
  border:1px solid var(--pc-line);border-radius:6px;
  font-size:13px;color:var(--pc-text);background:#fff;
  width:200px;outline:none;
}
.filter-input:focus{border-color:var(--pc-primary);}
.filter-count{margin-left:auto;font-size:12px;font-weight:800;color:var(--pc-muted);}

/* ━━━ テーブル ━━━ */
.tbl{width:100%;border-collapse:collapse;font-size:14px;}
.tbl thead th{
  height:38px;background:#f4f8fa;
  text-align:left;padding:0 14px;
  font-size:12px;font-weight:900;color:#4c6068;
  border-bottom:2px solid var(--pc-line);
  white-space:nowrap;position:sticky;top:0;z-index:1;
}
.tbl tbody tr{
  border-bottom:1px solid #edf2f4;
  cursor:pointer;transition:background .1s;
}
.tbl tbody tr:hover{background:#f0f9fc;}
.tbl tbody tr.selected{background:#e0f4fa;}
.tbl tbody td{
  height:46px;padding:0 14px;
  font-weight:700;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;max-width:200px;
}
.tbl tbody tr:last-child td{border-bottom:0;}

/* 患者番号 */
.pt-no{font-size:12px;font-weight:900;color:var(--pc-muted);}
/* 資機材タグ */
.equip-tag{
  display:inline-flex;align-items:center;
  height:20px;padding:0 7px;
  border-radius:999px;
  background:#e0f0ff;color:#1060b0;
  border:1px solid #90c0f0;
  font-size:11px;font-weight:900;
  margin-right:4px;
}
/* ステータスバッジ */
.status-badge{
  display:inline-flex;align-items:center;justify-content:center;
  height:22px;padding:0 10px;border-radius:999px;
  font-size:11px;font-weight:900;white-space:nowrap;
}
.badge-active{background:var(--pc-ok);color:#197229;border:1px solid #90d090;}
.badge-stop{background:#eef1f3;color:#4e5f66;border:1px solid #c8d4d8;}

/* ━━━ 右DETAILパネル ━━━ */
.detail{
  grid-column:3;grid-row:2;
  background:#fff;
  border-left:1px solid var(--pc-line);
  overflow-y:auto;
  display:flex;flex-direction:column;
}
.detail-empty{
  flex:1;display:grid;place-items:center;
  text-align:center;color:var(--pc-muted);
  font-size:13px;font-weight:800;line-height:2;
  padding:40px 20px;
}
.detail-content{display:none;flex-direction:column;height:100%;}
.detail-content.show{display:flex;}

/* 詳細ヘッダー */
.detail-hd{
  padding:18px 18px 14px;
  border-bottom:1px solid var(--pc-line);
  flex-shrink:0;
}
.detail-hd-label{font-size:11px;font-weight:800;color:var(--pc-muted);letter-spacing:.06em;margin-bottom:4px;}
.detail-hd-name{font-size:20px;font-weight:900;color:var(--pc-text);}
.detail-hd-no{font-size:12px;font-weight:800;color:var(--pc-muted);margin-top:2px;}
.detail-hd-actions{display:flex;gap:8px;margin-top:12px;}
.btn-primary{
  flex:1;height:36px;border:0;border-radius:7px;
  background:linear-gradient(90deg,var(--pc-primary-dark),var(--pc-primary));
  color:#fff;font-size:13px;font-weight:900;cursor:pointer;
}
.btn-outline{
  flex:1;height:36px;
  border:1px solid var(--pc-primary);border-radius:7px;
  background:#fff;color:var(--pc-primary-dark);
  font-size:13px;font-weight:900;cursor:pointer;
}

/* 詳細ボディ */
.detail-body{flex:1;overflow-y:auto;padding:16px 18px 20px;}

/* セクション */
.sec{margin-bottom:18px;}
.sec-title{
  font-size:12px;font-weight:900;
  color:var(--pc-primary-dark);
  letter-spacing:.06em;
  padding-bottom:6px;
  border-bottom:2px solid var(--pc-line);
  margin-bottom:10px;
}
.info-grid{display:grid;grid-template-columns:88px 1fr;gap:6px 10px;font-size:13px;}
.info-key{font-weight:800;color:var(--pc-muted);padding-top:1px;}
.info-val{font-weight:700;color:var(--pc-text);word-break:break-all;}

/* 資機材タグ一覧 */
.equip-list{display:flex;flex-wrap:wrap;gap:6px;padding:4px 0;}

/* 申し送り入力 */
.memo-input{
  width:100%;min-height:72px;
  border:1px solid var(--pc-line);border-radius:8px;
  padding:10px 12px;font-size:13px;font-weight:700;
  color:var(--pc-text);resize:vertical;outline:none;
  font-family:inherit;
}
.memo-input:focus{border-color:var(--pc-primary);}
.memo-submit{
  margin-top:8px;height:34px;padding:0 16px;
  border:0;border-radius:7px;
  background:linear-gradient(90deg,var(--pc-primary-dark),var(--pc-primary));
  color:#fff;font-size:13px;font-weight:900;cursor:pointer;
}

/* 申し送り履歴 */
.memo-history{margin-top:12px;display:flex;flex-direction:column;gap:8px;}
.memo-item{
  background:#f4f8fa;border:1px solid var(--pc-line);
  border-radius:8px;padding:10px 12px;
}
.memo-item-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.memo-item-date{font-size:11px;font-weight:800;color:var(--pc-muted);}
.memo-item-author{font-size:11px;font-weight:800;color:var(--pc-primary-dark);}
.memo-item-body{font-size:13px;font-weight:700;color:var(--pc-text);line-height:1.6;}

/* ━━━ フッター ━━━ */
.footer{
  grid-column:2/4;grid-row:3;
  background:linear-gradient(90deg,var(--pc-primary-dark),var(--pc-primary));
  color:#fff;display:flex;align-items:center;justify-content:space-between;
  padding:0 18px;font-size:12px;font-weight:800;
}

/* ━━━ モーダル（新規登録・編集） ━━━ */
.modal-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.45);
  z-index:100;
  display:none;place-items:center;
}
.modal-overlay.show{display:grid;}
.modal{
  background:#fff;border-radius:12px;
  width:min(680px,92vw);max-height:88vh;
  overflow-y:auto;
  box-shadow:0 8px 40px rgba(0,0,0,.18);
}
.modal-head{
  position:sticky;top:0;background:#fff;
  padding:20px 24px 14px;
  border-bottom:1px solid var(--pc-line);
  display:flex;align-items:center;justify-content:space-between;
  z-index:1;
}
.modal-title{font-size:18px;font-weight:900;}
.modal-close{
  width:32px;height:32px;border:0;border-radius:50%;
  background:#f0f4f6;color:var(--pc-muted);
  font-size:18px;cursor:pointer;display:grid;place-items:center;
}
.modal-body{padding:20px 24px 24px;}

/* フォームグループ */
.form-row{margin-bottom:16px;}
.form-label{
  display:block;font-size:12px;font-weight:900;
  color:var(--pc-muted);margin-bottom:5px;letter-spacing:.04em;
}
.form-label .req{color:#c0392b;margin-left:3px;}
.form-input,
.form-select,
.form-textarea{
  width:100%;height:40px;
  border:1px solid var(--pc-line);border-radius:8px;
  padding:0 12px;font-size:14px;font-weight:700;
  color:var(--pc-text);background:#fff;outline:none;font-family:inherit;
}
.form-textarea{height:80px;padding:10px 12px;resize:vertical;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--pc-primary);}
.form-2col{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.form-3col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}

/* 資機材チェックボックス群 */
.check-group{
  display:flex;flex-wrap:wrap;gap:8px;padding:8px 0;
}
.check-item{
  display:flex;align-items:center;gap:6px;
  height:32px;padding:0 12px;
  border:1px solid var(--pc-line);border-radius:999px;
  background:#fff;cursor:pointer;
  font-size:13px;font-weight:700;color:var(--pc-text);
  transition:all .12s;
}
.check-item input{display:none;}
.check-item.checked{
  background:var(--pc-blue);
  border-color:var(--pc-primary);
  color:var(--pc-primary-dark);
  font-weight:900;
}

/* セクション区切り（モーダル内） */
.form-section{
  font-size:12px;font-weight:900;color:var(--pc-primary-dark);
  letter-spacing:.06em;
  padding:14px 0 8px;
  border-top:1px solid var(--pc-line);
  margin-top:6px;margin-bottom:12px;
}
.form-section:first-child{border-top:none;padding-top:0;}

/* モーダルフッター */
.modal-foot{
  position:sticky;bottom:0;background:#fff;
  padding:14px 24px 20px;
  border-top:1px solid var(--pc-line);
  display:flex;gap:10px;justify-content:flex-end;
}
.modal-cancel{
  height:40px;padding:0 20px;
  border:1px solid var(--pc-line);border-radius:8px;
  background:#fff;color:var(--pc-muted);font-size:14px;font-weight:900;cursor:pointer;
}
.modal-save{
  height:40px;padding:0 28px;
  border:0;border-radius:8px;
  background:linear-gradient(90deg,var(--pc-primary-dark),var(--pc-primary));
  color:#fff;font-size:14px;font-weight:900;cursor:pointer;
}
</style>
</head>
<body>
<div id="app">

  <!-- ━━━ サイドバー ━━━ -->
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-icon">ス</div>
      ステマネ
    </div>
    <nav class="nav">
      <button class="nav-item">ダッシュボード</button>
      <button class="nav-item">案件入力</button>
      <button class="nav-item">案件一覧</button>
      <button class="nav-item">請求管理</button>
      <button class="nav-item">入金管理</button>
      <button class="nav-item">支払管理</button>
      <button class="nav-item">車両・乗務員管理</button>
      <button class="nav-item">協力業者管理</button>
      <button class="nav-item active">マスター管理</button>
      <button class="nav-item">設定</button>
    </nav>
    <div class="sidebar-bottom">
      <button class="ipad-btn">iPad 表示に切替</button>
      <div class="company">株式会社〇〇タクシー<br>Ver.1.0.0</div>
    </div>
  </aside>

  <!-- ━━━ ヘッダー ━━━ -->
  <header class="header">
    <div>
      <div class="header-title">患者マスター</div>
      <div class="header-sub">登録患者の一覧・管理</div>
    </div>
    <input class="header-search" type="text" placeholder="氏名・フリガナ・患者番号で検索" id="header-search"/>
    <button class="header-btn" onclick="openModal()">＋ 新規登録</button>
  </header>

  <!-- ━━━ メインエリア（一覧） ━━━ -->
  <main class="main">
    <div class="panel">
      <div class="panel-head">
        <span>患者一覧</span>
        <div class="panel-head-right">
          <select class="filter-select" id="status-filter" style="height:30px;padding:0 8px;border:1px solid var(--pc-line);border-radius:6px;font-size:13px;">
            <option value="">すべて</option>
            <option value="active">有効</option>
            <option value="stop">停止</option>
          </select>
        </div>
      </div>
      <div class="filter-bar">
        <span class="filter-label">資機材</span>
        <select class="filter-select" id="equip-filter">
          <option value="">すべて</option>
          <option>標準車いす</option>
          <option>リクライニング車いす</option>
          <option>ストレッチャー</option>
          <option>酸素</option>
          <option>吸引器</option>
          <option>歩行器</option>
          <option>付き添い</option>
        </select>
        <span class="filter-count" id="count-label">7件</span>
      </div>
      <div style="overflow-x:auto;">
        <table class="tbl" id="patient-table">
          <thead>
            <tr>
              <th style="width:80px;">患者番号</th>
              <th style="width:130px;">氏名</th>
              <th style="width:130px;">フリガナ</th>
              <th style="width:120px;">電話番号</th>
              <th>標準資機材</th>
              <th style="width:70px;">状態</th>
            </tr>
          </thead>
          <tbody id="patient-tbody"></tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- ━━━ 右DETAILパネル ━━━ -->
  <aside class="detail">

    <!-- 未選択時 -->
    <div class="detail-empty" id="detail-empty">
      患者を選択すると<br>詳細が表示されます
    </div>

    <!-- 選択時 -->
    <div class="detail-content" id="detail-content">

      <div class="detail-hd">
        <div class="detail-hd-label">選択中の患者</div>
        <div class="detail-hd-name" id="d-name">—</div>
        <div class="detail-hd-no" id="d-no">—</div>
        <div class="detail-hd-actions">
  <button class="btn-primary" onclick="location.href='patient-chart.html'">カルテ</button>
  <button class="btn-outline" onclick="openEditModal()">編集</button>
  <button class="btn-outline" id="toggle-btn" onclick="toggleStatus()">停止</button>
</div>
      </div>

      <div class="detail-body">

        <!-- 基本情報 -->
        <div class="sec">
          <div class="sec-title">基本情報</div>
          <div class="info-grid">
            <div class="info-key">患者番号</div><div class="info-val" id="d-ptno">—</div>
            <div class="info-key">氏名</div><div class="info-val" id="d-name2">—</div>
            <div class="info-key">フリガナ</div><div class="info-val" id="d-kana">—</div>
            <div class="info-key">電話番号</div><div class="info-val" id="d-tel">—</div>
            <div class="info-key">住所</div><div class="info-val" id="d-addr">—</div>
            <div class="info-key">建物種類</div><div class="info-val" id="d-building">—</div>
          </div>
        </div>

        <!-- 搬送情報 -->
        <div class="sec">
          <div class="sec-title">搬送情報</div>
          <div class="info-grid">
            <div class="info-key">標準資機材</div>
            <div class="info-val">
              <div class="equip-list" id="d-equip">—</div>
            </div>
          </div>
        </div>

        <!-- 現場情報 -->
        <div class="sec">
          <div class="sec-title">現場情報</div>
          <div class="info-grid">
            <div class="info-key">お迎え場所</div><div class="info-val" id="d-pickup">—</div>
            <div class="info-key">駐車場所</div><div class="info-val" id="d-parking">—</div>
            <div class="info-key">エレベーター</div><div class="info-val" id="d-elevator">—</div>
            <div class="info-key">階段</div><div class="info-val" id="d-stairs">—</div>
            <div class="info-key">キーボックス</div><div class="info-val" id="d-keybox">—</div>
            <div class="info-key">注意事項</div><div class="info-val" id="d-caution">—</div>
          </div>
        </div>

        <!-- 申し送り -->
        <div class="sec">
          <div class="sec-title">患者申し送り</div>
          <div class="info-grid" style="margin-bottom:10px;">
            <div class="info-key">申し送り</div><div class="info-val" id="d-memo">—</div>
          </div>
          <textarea class="memo-input" id="memo-input" placeholder="新しい申し送りを入力..."></textarea>
          <button class="memo-submit" onclick="addMemo()">登録</button>
        </div>

        <!-- 申し送り履歴 -->
        <div class="sec">
          <div class="sec-title">申し送り履歴</div>
          <div class="memo-history" id="memo-history"></div>
        </div>

      </div>
    </div>
  </aside>

  <!-- ━━━ フッター ━━━ -->
  <footer class="footer">
    <span>ステマネ - Status Manager</span>
    <span>患者マスター</span>
  </footer>

</div>

<!-- ━━━ 新規登録・編集モーダル ━━━ -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">
    <div class="modal-head">
      <div class="modal-title" id="modal-title">患者 新規登録</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">

      <div class="form-section">基本情報</div>
      <div class="form-2col">
        <div class="form-row">
          <label class="form-label">氏名<span class="req">*</span></label>
          <input class="form-input" id="f-name" type="text" placeholder="山田 花子"/>
        </div>
        <div class="form-row">
          <label class="form-label">フリガナ<span class="req">*</span></label>
          <input class="form-input" id="f-kana" type="text" placeholder="ヤマダ ハナコ"/>
        </div>
      </div>
      <div class="form-2col">
        <div class="form-row">
          <label class="form-label">電話番号</label>
          <input class="form-input" id="f-tel" type="tel" placeholder="082-000-0000"/>
        </div>
        <div class="form-row">
          <label class="form-label">患者番号（空白で自動採番）</label>
          <input class="form-input" id="f-ptno" type="text" placeholder="自動"/>
        </div>
      </div>
      <div class="form-row">
        <label class="form-label">住所</label>
        <input class="form-input" id="f-addr" type="text" placeholder="広島市中区〇〇町1-2-3"/>
      </div>
      <div class="form-row">
        <label class="form-label">建物種類</label>
        <select class="form-select" id="f-building">
          <option>戸建て</option>
          <option>集合住宅</option>
          <option>施設</option>
          <option>病院</option>
          <option>その他</option>
        </select>
      </div>

      <div class="form-section">搬送情報</div>
      <div class="form-row">
        <label class="form-label">標準必要資機材（複数選択可）</label>
        <div class="check-group" id="equip-checks">
          <label class="check-item"><input type="checkbox" value="標準車いす"/>標準車いす</label>
          <label class="check-item"><input type="checkbox" value="リクライニング車いす"/>リクライニング車いす</label>
          <label class="check-item"><input type="checkbox" value="ストレッチャー"/>ストレッチャー</label>
          <label class="check-item"><input type="checkbox" value="酸素"/>酸素</label>
          <label class="check-item"><input type="checkbox" value="吸引器"/>吸引器</label>
          <label class="check-item"><input type="checkbox" value="歩行器"/>歩行器</label>
          <label class="check-item"><input type="checkbox" value="付き添い"/>付き添い</label>
        </div>
      </div>

      <div class="form-section">現場情報</div>
      <div class="form-2col">
        <div class="form-row">
          <label class="form-label">お迎え場所</label>
          <input class="form-input" id="f-pickup" type="text" placeholder="玄関前"/>
        </div>
        <div class="form-row">
          <label class="form-label">駐車場所</label>
          <input class="form-input" id="f-parking" type="text" placeholder="敷地内駐車場"/>
        </div>
      </div>
      <div class="form-3col">
        <div class="form-row">
          <label class="form-label">エレベーター</label>
          <select class="form-select" id="f-elevator">
            <option>なし</option>
            <option>あり</option>
            <option>不明</option>
          </select>
        </div>
        <div class="form-row">
          <label class="form-label">階段</label>
          <select class="form-select" id="f-stairs">
            <option>なし</option>
            <option>あり</option>
            <option>要介助</option>
            <option>不明</option>
          </select>
        </div>
        <div class="form-row">
          <label class="form-label">キーボックス</label>
          <select class="form-select" id="f-keybox">
            <option>なし</option>
            <option>あり</option>
            <option>不明</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <label class="form-label">注意事項</label>
        <textarea class="form-textarea" id="f-caution" placeholder="例：左手が不自由なため乗降時に注意"></textarea>
      </div>

      <div class="form-section">申し送り</div>
      <div class="form-row">
        <label class="form-label">患者申し送り</label>
        <textarea class="form-textarea" id="f-memo" placeholder="例：話しかけるのが好き。ゆっくり丁寧に対応"></textarea>
      </div>

    </div>
    <div class="modal-foot">
      <button class="modal-cancel" onclick="closeModal()">キャンセル</button>
      <button class="modal-save" onclick="savePatient()">保存</button>
    </div>
  </div>
</div>

<script>
(function(){

  /* ━━━ 資機材マスター（初期値） ━━━ */
  const EQUIP_MASTER = ['標準車いす','リクライニング車いす','ストレッチャー','酸素','吸引器','歩行器','付き添い'];

  /* ━━━ ダミーデータ ━━━ */
  let patients = [
    {id:1,ptno:'PT-001',name:'山田 花子',kana:'ヤマダ ハナコ',tel:'082-111-0001',addr:'広島市中区東白島町1-1',building:'集合住宅',equip:['標準車いす'],pickup:'玄関前',parking:'敷地内',elevator:'あり',stairs:'なし',keybox:'なし',caution:'左手不自由、乗降時注意',memo:'明るい方。声かけ多めに。',status:'active',memos:[{date:'2026/06/10',author:'田中',body:'先週より体調やや不良。乗降時に確認を。'},{date:'2026/05/28',author:'佐藤',body:'新しい車いすに変更。旧車いすは不使用。'}]},
    {id:2,ptno:'PT-002',name:'鈴木 一郎',kana:'スズキ イチロウ',tel:'082-222-0002',addr:'広島市南区宇品海岸2-2',building:'病院',equip:['酸素','標準車いす'],pickup:'2F病室前',parking:'来客用駐車場',elevator:'あり',stairs:'要介助',keybox:'あり',caution:'酸素ボンベ常時使用',memo:'',status:'active',memos:[]},
    {id:3,ptno:'PT-003',name:'佐々木 次郎',kana:'ササキ ジロウ',tel:'082-333-0003',addr:'広島市西区己斐本町3-3',building:'戸建て',equip:['ストレッチャー'],pickup:'玄関',parking:'路上',elevator:'なし',stairs:'あり',keybox:'なし',caution:'完全臥床。ストレッチャー必須。',memo:'緊張しやすい。搬送中は声かけを。',status:'active',memos:[{date:'2026/06/01',author:'山本',body:'家族から連絡あり。次回は娘様同乗予定。'}]},
    {id:4,ptno:'PT-004',name:'田中 美子',kana:'タナカ ヨシコ',tel:'082-444-0004',addr:'広島市東区温品4-4',building:'戸建て',equip:['歩行器'],pickup:'玄関前',parking:'敷地内',elevator:'—',stairs:'なし',keybox:'—',caution:'',memo:'',status:'active',memos:[]},
    {id:5,ptno:'PT-005',name:'高橋 健二',kana:'タカハシ ケンジ',tel:'082-555-0005',addr:'広島市安佐南区5-5',building:'施設',equip:['標準車いす','吸引器'],pickup:'居室前',parking:'第2駐車場',elevator:'あり',stairs:'なし',keybox:'あり',caution:'吸引が必要な場合あり',memo:'早口で聞き取りにくいが丁寧に対応を。',status:'stop',memos:[]},
    {id:6,ptno:'PT-006',name:'伊藤 幸子',kana:'イトウ サチコ',tel:'082-666-0006',addr:'広島市安佐北区6-6',building:'戸建て',equip:['付き添い'],pickup:'自室前',parking:'なし',elevator:'なし',stairs:'あり',keybox:'—',caution:'付き添いが必要',memo:'',status:'active',memos:[]},
    {id:7,ptno:'PT-007',name:'渡辺 正男',kana:'ワタナベ マサオ',tel:'082-777-0007',addr:'廿日市市7-7',building:'戸建て',equip:['リクライニング車いす'],pickup:'玄関',parking:'前面道路',elevator:'—',stairs:'なし',keybox:'なし',caution:'リクライニング必須。角度60度',memo:'音楽が好き。搬送中BGMOKとのこと。',status:'active',memos:[]},
  ];

  let selectedId = null;
  let editMode = false;

  /* ━━━ テーブル描画 ━━━ */
  function renderTable(){
    const statusFilter = document.getElementById('status-filter').value;
    const equipFilter  = document.getElementById('equip-filter').value;
    const searchVal    = document.getElementById('header-search').value.trim();

    let data = patients.filter(p => {
      if(statusFilter && p.status !== statusFilter) return false;
      if(equipFilter  && !p.equip.includes(equipFilter)) return false;
      if(searchVal){
        const q = searchVal;
        if(!p.name.includes(q) && !p.kana.includes(q) && !p.ptno.includes(q)) return false;
      }
      return true;
    });

    document.getElementById('count-label').textContent = data.length + '件';

    const tbody = document.getElementById('patient-tbody');
    tbody.innerHTML = data.map(p => `
      <tr data-id="${p.id}" class="${p.id === selectedId ? 'selected' : ''}">
        <td><span class="pt-no">${p.ptno}</span></td>
        <td>${p.name}</td>
        <td style="font-size:12px;color:var(--pc-muted);">${p.kana}</td>
        <td>${p.tel}</td>
        <td>${p.equip.map(e=>`<span class="equip-tag">${e}</span>`).join('')}</td>
        <td><span class="status-badge ${p.status==='active'?'badge-active':'badge-stop'}">${p.status==='active'?'有効':'停止'}</span></td>
      </tr>
    `).join('');

    tbody.querySelectorAll('tr').forEach(tr => {
      tr.addEventListener('click', () => selectPatient(parseInt(tr.dataset.id)));
    });
  }

  /* ━━━ 患者選択 → DETAIL反映 ━━━ */
  function selectPatient(id){
    selectedId = id;
    renderTable();
    const p = patients.find(x => x.id === id);
    if(!p) return;

    document.getElementById('detail-empty').style.display   = 'none';
    document.getElementById('detail-content').classList.add('show');

    document.getElementById('d-name').textContent  = p.name + ' 様';
    document.getElementById('d-no').textContent    = p.ptno;
    document.getElementById('d-ptno').textContent  = p.ptno;
    document.getElementById('d-name2').textContent = p.name;
    document.getElementById('d-kana').textContent  = p.kana;
    document.getElementById('d-tel').textContent   = p.tel || '—';
    document.getElementById('d-addr').textContent  = p.addr || '—';
    document.getElementById('d-building').textContent = p.building || '戸建て';

    const equipEl = document.getElementById('d-equip');
    equipEl.innerHTML = p.equip.length
      ? p.equip.map(e=>`<span class="equip-tag">${e}</span>`).join('')
      : '—';

    document.getElementById('d-pickup').textContent   = p.pickup   || '—';
    document.getElementById('d-parking').textContent  = p.parking  || '—';
    document.getElementById('d-elevator').textContent = p.elevator || '—';
    document.getElementById('d-stairs').textContent   = p.stairs   || '—';
    document.getElementById('d-keybox').textContent   = p.keybox   || '—';
    document.getElementById('d-caution').textContent  = p.caution  || '—';
    document.getElementById('d-memo').textContent     = p.memo     || '—';

    const toggleBtn = document.getElementById('toggle-btn');
    toggleBtn.textContent = p.status === 'active' ? '停止' : '有効に戻す';

    renderMemoHistory(p);
  }

  /* 申し送り履歴描画 */
  function renderMemoHistory(p){
    const el = document.getElementById('memo-history');
    if(!p.memos || p.memos.length === 0){
      el.innerHTML = '<div style="font-size:13px;color:var(--pc-muted);font-weight:700;">履歴はありません</div>';
      return;
    }
    el.innerHTML = p.memos.map(m => `
      <div class="memo-item">
        <div class="memo-item-header">
          <span class="memo-item-date">${m.date}</span>
          <span class="memo-item-author">${m.author}</span>
        </div>
        <div class="memo-item-body">${m.body}</div>
      </div>
    `).join('');
  }

  /* ━━━ 申し送り登録 ━━━ */
  window.addMemo = function(){
    const body = document.getElementById('memo-input').value.trim();
    if(!body || !selectedId) return;
    const p = patients.find(x => x.id === selectedId);
    if(!p) return;
    const now = new Date();
    const dateStr = `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()}`;
    p.memos.unshift({date:dateStr, author:'管理者', body});
    document.getElementById('memo-input').value = '';
    renderMemoHistory(p);
  };

  /* ━━━ 停止・有効切替 ━━━ */
  window.toggleStatus = function(){
    if(!selectedId) return;
    const p = patients.find(x => x.id === selectedId);
    if(!p) return;
    p.status = p.status === 'active' ? 'stop' : 'active';
    selectPatient(selectedId);
    renderTable();
  };

  /* ━━━ モーダル ━━━ */
  window.openModal = function(){
    editMode = false;
    document.getElementById('modal-title').textContent = '患者 新規登録';
    clearForm();
    document.getElementById('modal-overlay').classList.add('show');
  };

  window.openEditModal = function(){
    if(!selectedId) return;
    editMode = true;
    const p = patients.find(x => x.id === selectedId);
    if(!p) return;
    document.getElementById('modal-title').textContent = '患者 編集：' + p.name;
    fillForm(p);
    document.getElementById('modal-overlay').classList.add('show');
  };

  window.closeModal = function(){
    document.getElementById('modal-overlay').classList.remove('show');
  };

  window.closeModalOutside = function(e){
    if(e.target === document.getElementById('modal-overlay')) closeModal();
  };

  function clearForm(){
    ['f-name','f-kana','f-tel','f-ptno','f-addr','f-pickup','f-parking','f-caution','f-memo'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.getElementById('f-building').value = '戸建て';
    document.getElementById('f-elevator').value = 'なし';
    document.getElementById('f-stairs').value = 'なし';
    document.getElementById('f-keybox').value = 'なし';
    document.querySelectorAll('#equip-checks .check-item').forEach(el => {
      el.classList.remove('checked');
      el.querySelector('input').checked = false;
    });
  }

  function fillForm(p){
    document.getElementById('f-name').value    = p.name;
    document.getElementById('f-kana').value    = p.kana;
    document.getElementById('f-tel').value     = p.tel;
    document.getElementById('f-ptno').value    = p.ptno;
    document.getElementById('f-addr').value    = p.addr;
    document.getElementById('f-building').value = p.building || '戸建て';
    document.getElementById('f-pickup').value  = p.pickup;
    document.getElementById('f-parking').value = p.parking;
    document.getElementById('f-elevator').value= p.elevator;
    document.getElementById('f-stairs').value  = p.stairs;
    document.getElementById('f-keybox').value  = p.keybox;
    document.getElementById('f-caution').value = p.caution;
    document.getElementById('f-memo').value    = p.memo;
    document.querySelectorAll('#equip-checks .check-item').forEach(el => {
      const val = el.querySelector('input').value;
      if(p.equip.includes(val)){
        el.classList.add('checked');
        el.querySelector('input').checked = true;
      } else {
        el.classList.remove('checked');
        el.querySelector('input').checked = false;
      }
    });
  }

  window.savePatient = function(){
    const name = document.getElementById('f-name').value.trim();
    const kana = document.getElementById('f-kana').value.trim();
    if(!name || !kana){ alert('氏名とフリガナは必須です'); return; }

    const equip = [];
    document.querySelectorAll('#equip-checks .check-item.checked input').forEach(el => equip.push(el.value));

    if(editMode && selectedId){
      const p = patients.find(x => x.id === selectedId);
      p.name     = name;
      p.kana     = kana;
      p.tel      = document.getElementById('f-tel').value.trim();
      p.ptno     = document.getElementById('f-ptno').value.trim() || p.ptno;
      p.addr     = document.getElementById('f-addr').value.trim();
      p.building = document.getElementById('f-building').value;
      p.equip    = equip;
      p.pickup   = document.getElementById('f-pickup').value.trim();
      p.parking  = document.getElementById('f-parking').value.trim();
      p.elevator = document.getElementById('f-elevator').value;
      p.stairs   = document.getElementById('f-stairs').value;
      p.keybox   = document.getElementById('f-keybox').value;
      p.caution  = document.getElementById('f-caution').value.trim();
      p.memo     = document.getElementById('f-memo').value.trim();
      closeModal();
      renderTable();
      selectPatient(selectedId);
    } else {
      const newId   = Math.max(...patients.map(x=>x.id)) + 1;
      const newPtno = document.getElementById('f-ptno').value.trim() || 'PT-' + String(newId).padStart(3,'0');
      patients.push({
        id:newId, ptno:newPtno,
        name, kana,
        tel:    document.getElementById('f-tel').value.trim(),
        addr:   document.getElementById('f-addr').value.trim(),
        building: document.getElementById('f-building').value,
        equip,
        pickup:   document.getElementById('f-pickup').value.trim(),
        parking:  document.getElementById('f-parking').value.trim(),
        elevator: document.getElementById('f-elevator').value,
        stairs:   document.getElementById('f-stairs').value,
        keybox:   document.getElementById('f-keybox').value,
        caution:  document.getElementById('f-caution').value.trim(),
        memo:     document.getElementById('f-memo').value.trim(),
        status:'active', memos:[]
      });
      closeModal();
      renderTable();
      selectPatient(newId);
    }
  };

  /* ━━━ チェックボックストグル ━━━ */
  document.querySelectorAll('#equip-checks .check-item').forEach(el => {
    el.addEventListener('click', function(){
      const inp = this.querySelector('input');
      inp.checked = !inp.checked;
      this.classList.toggle('checked', inp.checked);
    });
  });

  /* ━━━ フィルター・検索 ━━━ */
  document.getElementById('status-filter').addEventListener('change', renderTable);
  document.getElementById('equip-filter').addEventListener('change', renderTable);
  document.getElementById('header-search').addEventListener('input', renderTable);

  /* ━━━ 初期描画 ━━━ */
  renderTable();

})();
</script>
</body>
</html>
