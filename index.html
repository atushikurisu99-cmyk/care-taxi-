<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PC Fixed Canvas Scale v2</title>
<style>
  *{box-sizing:border-box}
  html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#dfeff3;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif;
  }

  :root{
    --base-w:1366;
    --base-h:663;
  }

  /* 画面全体。中身は JS で「1枚板」として等倍拡縮する */
  .viewport{
    position:relative;
    width:100vw;
    height:100vh;
    overflow:hidden;
    background:#dfeff3;
  }

  /* 1366×663 を基準にした固定キャンバス。カード単体は伸縮しない */
  .canvas{
    position:absolute;
    left:0;
    top:0;
    width:1366px;
    height:663px;
    transform-origin:0 0;
    background:#dfeff3;
  }

  .box{
    position:absolute;
    background:#fff;
    border:1px solid #2b4248;
    border-radius:3px;
  }

  .side{
    position:absolute;
    left:0;
    top:0;
    width:264px;
    height:663px;
    background:#07555b;
    color:#fff;
    overflow:hidden;
  }

  .logo{
    position:absolute;
    left:30px;
    top:24px;
    line-height:1;
    font-weight:900;
    font-size:34px;
    letter-spacing:-2px;
  }
  .sub-logo{
    position:absolute;
    left:32px;
    top:63px;
    font-size:9px;
    font-weight:800;
  }

  .menu{
    position:absolute;
    left:30px;
    top:72px;
    width:154px;
  }
  .menu-item{
    height:31px;
    display:flex;
    align-items:center;
    padding-left:10px;
    color:#fff;
    font-size:13px;
    font-weight:800;
    border-radius:4px;
    margin-bottom:7px;
    white-space:nowrap;
  }
  .menu-item.active{background:#13a0aa;}

  .ipad-btn{
    position:absolute;
    left:43px;
    bottom:75px;
    width:132px;
    height:26px;
    border:1px solid rgba(255,255,255,.9);
    border-radius:3px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:11px;
    font-weight:800;
  }
  .company{
    position:absolute;
    left:43px;
    bottom:31px;
    font-size:10px;
    font-weight:800;
    line-height:1.45;
  }

  /* v1の位置関係をpx固定化 */
  .search{left:282px; top:8px; width:336px; height:33px;}

  .kpi1{left:810px; top:13px; width:141px; height:80px;}
  .kpi2{left:959px; top:13px; width:127px; height:80px;}
  .kpi3{left:1094px; top:13px; width:127px; height:80px;}
  .kpi4{left:1229px; top:13px; width:122px; height:80px;}

  .main{left:278px; top:111px; width:821px; height:387px;}
  .detail{left:1111px; top:111px; width:243px; height:534px;}
  .memo{left:278px; top:506px; width:428px; height:139px;}
  .quick{left:719px; top:506px; width:381px; height:139px;}
</style>
</head>
<body>
  <div class="viewport">
    <div class="canvas" id="canvas">
      <div class="side">
        <div class="logo">スママネ</div>
        <div class="sub-logo">Status Manager</div>
        <div class="menu">
          <div class="menu-item active">ダッシュボード</div>
          <div class="menu-item">案件入力</div>
          <div class="menu-item">案件一覧</div>
          <div class="menu-item">請求管理</div>
          <div class="menu-item">入金管理</div>
          <div class="menu-item">支払管理</div>
          <div class="menu-item">車両・乗務員管理</div>
          <div class="menu-item">協力業者管理</div>
          <div class="menu-item">マスター管理</div>
          <div class="menu-item">設定</div>
        </div>
        <div class="ipad-btn">iPad 表示に切替</div>
        <div class="company">株式会社〇〇タクシー<br>Ver.1.0.0</div>
      </div>

      <div class="box search"></div>
      <div class="box kpi1"></div>
      <div class="box kpi2"></div>
      <div class="box kpi3"></div>
      <div class="box kpi4"></div>
      <div class="box main"></div>
      <div class="box detail"></div>
      <div class="box memo"></div>
      <div class="box quick"></div>
    </div>
  </div>
<script>
(function(){
  const BASE_W = 1366;
  const BASE_H = 663;
  const canvas = document.getElementById('canvas');

  function fit(){
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    /*
      位置が合っている v1 を「1366×663の1枚板」として扱う。
      カード単体は伸縮させず、全体だけを等倍拡縮。
      通常の1366×768実機フル画面では scale=1 になる。
    */
    const scale = Math.min(vw / BASE_W, vh / BASE_H);
    canvas.style.transform = 'scale(' + scale + ')';
    canvas.style.left = '0px';
    canvas.style.top = '0px';
  }

  window.addEventListener('resize', fit);
  fit();
})();
</script>
</body>
</html>
