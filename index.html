<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>介護タクシー管理アプリ Shell</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/shell.css">
</head>
<body>
  <div id="app">
    <div class="top-bar" aria-label="上部バー">
      <div class="top-inner">
        <div class="device-info">2:36　6月12日(火)</div>
        <button class="menu-button" type="button" aria-label="メニュー">☰</button>
        <div class="main-time">5/10（日） 05:14</div>
        <button class="reserve-button" type="button">＋予約登録</button>
      </div>
    </div>

    <div class="white-stage" aria-label="管理画面本体">
      <div class="area area-location" aria-label="LOCATION"><h2>LOCATION</h2></div>
      <div class="area area-detail" aria-label="DETAIL"><h2>DETAIL</h2></div>
      <div class="area area-days" aria-label="DAYS"><h2>DAYS</h2></div>
      <div class="area area-status" aria-label="STATUS"><h2>STATUS</h2></div>
    </div>
  </div>
  <script src="js/lock.js"></script>
</body>
</html>
