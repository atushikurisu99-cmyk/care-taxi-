<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Care Taxi UI" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#3568c8" />
  <title>Care Taxi UI</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      touch-action: none;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: fixed;
      inset: 0;
      background: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      user-select: none;
      -webkit-user-select: none;
    }

    :root {
      --app-h: 100vh;
      --blue: #3568c8;

      --frame-left: 42px;
      --frame-right: 42px;
      --frame-bottom: 28px;

      --header-h: 112px;
      --status-h: 24px;

      --content-left: 74px;
      --content-right: 74px;
      --content-top: 150px;
      --content-bottom: 38px;

      --detail-w: 224px;
      --detail-gap: 54px;

      --days-h: 150px;
    }

    .app {
      position: fixed;
      left: 0;
      top: 0;
      width: 100vw;
      height: var(--app-h);
      overflow: hidden;
      background: #ffffff;
    }

    .outer-frame {
      position: absolute;
      left: var(--frame-left);
      right: var(--frame-right);
      top: 0;
      bottom: var(--frame-bottom);
      border-left: 9px solid #1f1f1f;
      border-right: 9px solid #1f1f1f;
      border-bottom: 9px solid #1f1f1f;
      overflow: hidden;
      background: #ffffff;
    }

    .header {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      height: var(--header-h);
      background: var(--blue);
      overflow: hidden;
    }

    .small-status {
      position: absolute;
      left: 14px;
      top: 7px;
      color: rgba(255,255,255,0.82);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }

    .mock-status-right {
      position: absolute;
      right: 12px;
      top: 7px;
      height: 14px;
      color: rgba(255,255,255,0.78);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      white-space: nowrap;
    }

    .menu {
      position: absolute;
      left: 56px;
      top: 46px;
      width: 48px;
      height: 40px;
    }

    .menu span {
      display: block;
      width: 100%;
      height: 5px;
      margin-bottom: 10px;
      background: #ffffff;
      border-radius: 999px;
    }

    .date {
      position: absolute;
      left: 126px;
      top: 42px;
      height: 54px;
      color: #ffffff;
      font-size: 36px;
      font-weight: 500;
      line-height: 1;
      white-space: nowrap;
    }

    .reserve {
      position: absolute;
      right: 52px;
      top: 40px;
      width: 102px;
      height: 42px;
      border-radius: 9px;
      background: #ffffff;
      color: #2d5fb8;
      font-size: 16px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
      border: 1px solid rgba(0,0,0,0.18);
    }

    .content {
      position: absolute;
      left: var(--content-left);
      right: var(--content-right);
      top: var(--content-top);
      bottom: var(--content-bottom);
      overflow: hidden;
      background: #ffffff;
    }

    .label {
      position: absolute;
      color: #1fa05c;
      font-size: 14px;
      font-weight: 700;
      line-height: 1;
      z-index: 5;
    }

    .label-location {
      left: 0;
      top: 0;
    }

    .label-detail {
      right: calc(var(--detail-w) - 58px);
      top: 0;
    }

    .label-days {
      left: 0;
      bottom: calc(var(--days-h) + 2px);
    }

    .label-status {
      right: calc(var(--detail-w) - 62px);
      bottom: calc(var(--days-h) + 2px);
    }

    .detail-l {
      position: absolute;
      right: 0;
      top: 0;
      width: var(--detail-w);
      bottom: calc(var(--days-h) + 18px);
      pointer-events: none;
    }

    .detail-l::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 1px;
      background: rgba(0,0,0,0.35);
    }

    .detail-l::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 1px;
      background: rgba(0,0,0,0.35);
    }

    .days-area {
      position: absolute;
      left: 0;
      right: calc(var(--detail-w) + var(--detail-gap));
      bottom: 0;
      height: var(--days-h);
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
    }

    .day-card {
      position: relative;
      width: 100%;
      height: 100%;
      border: 1px solid rgba(0,0,0,0.28);
      border-radius: 11px;
      background: #ffffff;
    }

    .status-area {
      position: absolute;
      right: 0;
      bottom: 0;
      width: var(--detail-w);
      height: var(--days-h);
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="outer-frame">
      <div class="header">
        <div class="small-status">15:06　5月5日(火)</div>
        <div class="mock-status-right">••••  Wi-Fi  ◎  40% ▭</div>

        <div class="menu">
          <span></span>
          <span></span>
          <span></span>
        </div>

        <div class="date">4/29（火）14:26</div>
        <div class="reserve">＋予約登録</div>
      </div>

      <div class="content">
        <div class="label label-location">LOCATION</div>
        <div class="label label-detail">DETAIL</div>
        <div class="label label-days">DAYS</div>
        <div class="label label-status">STATUS</div>

        <div class="detail-l"></div>

        <div class="days-area">
          <div class="day-card"></div>
          <div class="day-card"></div>
          <div class="day-card"></div>
          <div class="day-card"></div>
          <div class="day-card"></div>
          <div class="day-card"></div>
          <div class="day-card"></div>
        </div>

        <div class="status-area"></div>
      </div>
    </div>
  </div>

  <script>
    function lockSize() {
      document.documentElement.style.setProperty("--app-h", window.innerHeight + "px");
      window.scrollTo(0, 0);
      document.body.scrollTop = 0;
      document.documentElement.scrollTop = 0;
    }

    lockSize();
    window.addEventListener("resize", lockSize);
    window.addEventListener("orientationchange", lockSize);

    document.addEventListener("touchmove", function(e) {
      e.preventDefault();
    }, { passive: false });

    document.addEventListener("gesturestart", function(e) {
      e.preventDefault();
    }, { passive: false });
  </script>
</body>
</html>
