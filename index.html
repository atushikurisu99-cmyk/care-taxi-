<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PC Big Boxes Fixed Scale</title>
<style>
  *{box-sizing:border-box}
  html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#dfeff3;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif;
  }

  :root{
    --base-w:1366;
    --base-h:662;
    --scale:1;
  }

  .viewport{
    position:relative;
    width:100vw;
    height:100vh;
    overflow:hidden;
    background:#dfeff3;
  }

  .stage{
    position:absolute;
    left:0;
    top:0;
    width:1366px;
    height:662px;
    transform:scale(var(--scale));
    transform-origin:left top;
    background:#dfeff3;
  }

  .box{
    position:absolute;
    background:#fff;
    border:1px solid #2b4248;
    border-radius:3px;
  }

  .side{
    position:absolute;
    left:0;
    top:0;
    width:264px;
    height:662px;
    background:#07555b;
    color:#fff;
    overflow:hidden;
  }

  .logo{
    position:absolute;
    left:42px;
    top:24px;
    font-weight:900;
    font-size:30px;
    letter-spacing:-2px;
    line-height:.9;
  }
  .logo small{
    display:block;
    margin-top:7px;
    font-size:10px;
    letter-spacing:0;
  }

  .nav{
    position:absolute;
    left:30px;
    top:70px;
    width:150px;
  }
  .nav div{
    height:27px;
    line-height:27px;
    margin-bottom:4px;
    padding-left:10px;
    font-size:12px;
    font-weight:800;
    white-space:nowrap;
  }
  .nav .active{
    background:#159ba4;
    border-radius:4px;
  }

  .switch{
    position:absolute;
    left:43px;
    bottom:78px;
    width:132px;
    height:25px;
    border:1px solid rgba(255,255,255,.85);
    border-radius:3px;
    font-size:11px;
    font-weight:800;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .company{
    position:absolute;
    left:43px;
    bottom:32px;
    font-size:9px;
    font-weight:700;
    line-height:1.45;
  }

  .search{left:281px; top:8px; width:336px; height:32px;}

  .kpi1{left:810px; top:13px; width:141px; height:79px;}
  .kpi2{left:959px; top:13px; width:127px; height:79px;}
  .kpi3{left:1094px; top:13px; width:127px; height:79px;}
  .kpi4{left:1229px; top:13px; width:122px; height:79px;}

  .main{left:278px; top:111px; width:821px; height:386px;}
  .detail{left:1111px; top:111px; width:243px; height:533px;}
  .memo{left:278px; top:506px; width:428px; height:138px;}
  .quick{left:718px; top:506px; width:381px; height:138px;}
</style>
</head>
<body>
  <div class="viewport">
    <div class="stage" id="stage">
      <div class="side">
        <div class="logo">スママネ<small>Status Manager</small></div>
        <div class="nav">
          <div class="active">ダッシュボード</div>
          <div>案件入力</div>
          <div>案件一覧</div>
          <div>請求管理</div>
          <div>入金管理</div>
          <div>支払管理</div>
          <div>車両・乗務員管理</div>
          <div>協力業者管理</div>
          <div>マスター管理</div>
          <div>設定</div>
        </div>
        <div class="switch">iPad 表示に切替</div>
        <div class="company">株式会社○○タクシー<br>Ver.1.0.0</div>
      </div>
      <div class="box search"></div>
      <div class="box kpi1"></div>
      <div class="box kpi2"></div>
      <div class="box kpi3"></div>
      <div class="box kpi4"></div>
      <div class="box main"></div>
      <div class="box detail"></div>
      <div class="box memo"></div>
      <div class="box quick"></div>
    </div>
  </div>
<script>
(function(){
  const BASE_W = 1366;
  const BASE_H = 662;
  function fit(){
    const scale = Math.min(window.innerWidth / BASE_W, window.innerHeight / BASE_H);
    document.documentElement.style.setProperty('--scale', String(scale));
  }
  window.addEventListener('resize', fit, {passive:true});
  fit();
})();
</script>
</body>
</html>
