<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>介護タクシー管理アプリ</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/areas.css">
</head>
<body>
  <div id="app" class="app-shell">
    <main id="stage" class="stage" aria-label="介護タクシー管理アプリ">
      <header class="top-band" aria-label="上部情報">
        <button class="hamburger" aria-label="メニュー"><span></span><span></span><span></span></button>
        <div class="date-text">5/10（日）</div>
        <div class="time-text">05:14</div>
        <button class="booking-button">＋予約登録</button>
      </header>

      <section class="area area-location" aria-label="LOCATION">
        <h2>LOCATION</h2>
        <div class="area-body" id="location-root"></div>
      </section>

      <section class="area area-detail" aria-label="DETAIL">
        <h2>DETAIL</h2>
        <div class="area-body" id="detail-root"></div>
      </section>

      <section class="area area-days" aria-label="DAYS">
        <h2>DAYS</h2>
        <div class="area-body" id="days-root"></div>
      </section>

      <section class="area area-status" aria-label="STATUS">
        <h2>STATUS</h2>
        <div class="area-body" id="status-root"></div>
      </section>
    </main>
  </div>
  <script src="js/scale.js"></script>
</body>
</html>
