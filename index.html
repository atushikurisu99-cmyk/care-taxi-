<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Care Taxi UI" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#ffffff" />

  <title>介護タクシー管理UI</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #111;
      overscroll-behavior: none;
      position: fixed;
      inset: 0;
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Helvetica Neue",
        sans-serif;
    }

    body {
      -webkit-user-select: none;
      user-select: none;
    }

    .app {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      height: 100svh;
      overflow: hidden;
      background: #ffffff;
      border: 2px solid #111;
    }

    .safe {
      position: absolute;
      left: 30px;
      right: 30px;
      top: 26px;
      bottom: 26px;
      overflow: hidden;
    }

    .top-bar {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 96px;
      background: #3769c8;
      border-radius: 32px 32px 0 0;
    }

    .menu {
      position: absolute;
      left: 38px;
      top: 28px;
      width: 52px;
      height: 42px;
    }

    .menu span {
      display: block;
      width: 100%;
      height: 5px;
      margin-bottom: 10px;
      background: #ffffff;
      border-radius: 999px;
    }

    .reserve-btn {
      position: absolute;
      right: 36px;
      top: 24px;
      width: 138px;
      height: 52px;
      background: #ffffff;
      border: 1px solid rgba(0, 0, 0, 0.28);
      border-radius: 12px;
    }

    .main {
      position: absolute;
      left: 0;
      right: 0;
      top: 146px;
      bottom: 196px;
      overflow: hidden;
    }

    .timeline {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      right: 326px;
      background: #f8f8f8;
      border: 1px solid rgba(0, 0, 0, 0.5);
      overflow: hidden;
    }

    .detail {
      position: absolute;
      top: 0;
      right: 0;
      width: 288px;
      height: 100%;
      background: #f8f8f8;
      border: 1px solid rgba(0, 0, 0, 0.5);
      overflow: hidden;
    }

    .detail-line {
      width: calc(100% - 42px);
      height: 1px;
      margin-left: 21px;
      background: rgba(0, 0, 0, 0.18);
    }

    .detail-line.a {
      margin-top: 120px;
    }

    .detail-line.b,
    .detail-line.c,
    .detail-line.d {
      margin-top: 58px;
    }

    .detail-line.e,
    .detail-line.f {
      margin-top: 104px;
    }

    .bottom {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 164px;
      overflow: hidden;
    }

    .days {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      right: 326px;
      background: #f8f8f8;
      border: 1px solid rgba(0, 0, 0, 0.5);
      overflow: hidden;
    }

    .days-head {
      width: 100%;
      height: 48px;
      border-bottom: 1px solid rgba(0, 0, 0, 0.25);
    }

    .days-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      height: calc(100% - 48px);
    }

    .day {
      position: relative;
      border-right: 1px solid rgba(0, 0, 0, 0.13);
    }

    .day:last-child {
      border-right: none;
    }

    .day::before {
      content: "";
      position: absolute;
      left: 20px;
      right: 20px;
      top: 26px;
      height: 28px;
      background: #dce6ff;
      border: 1px solid rgba(0, 0, 0, 0.45);
      border-radius: 5px;
    }

    .day::after {
      content: "";
      position: absolute;
      left: 20px;
      right: 40px;
      top: 72px;
      height: 28px;
      background: #e8f1df;
      border: 1px solid rgba(0, 0, 0, 0.45);
      border-radius: 5px;
    }

    .status {
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 288px;
      background: #f8f8f8;
      border: 1px solid rgba(0, 0, 0, 0.5);
      overflow: hidden;
    }

    .status-head {
      width: 100%;
      height: 48px;
      border-bottom: 1px solid rgba(0, 0, 0, 0.25);
    }

    .status-row {
      position: relative;
      width: 100%;
      height: calc((100% - 48px) / 3);
      border-bottom: 1px solid rgba(0, 0, 0, 0.13);
    }

    .status-row:last-child {
      border-bottom: none;
    }

    .status-row::before {
      content: "";
      position: absolute;
      left: 22px;
      top: 50%;
      width: 122px;
      height: 28px;
      transform: translateY(-50%);
      background: #dce6ff;
      border: 1px solid rgba(0, 0, 0, 0.45);
      border-radius: 5px;
    }

    .status-row::after {
      content: "";
      position: absolute;
      right: 20px;
      top: 50%;
      width: 104px;
      height: 28px;
      transform: translateY(-50%);
      background: #e8f1df;
      border: 1px solid rgba(0, 0, 0, 0.45);
      border-radius: 5px;
    }

    @supports (-webkit-touch-callout: none) {
      html,
      body {
        height: -webkit-fill-available;
      }

      .app {
        height: -webkit-fill-available;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="safe">
      <div class="top-bar">
        <div class="menu">
          <span></span>
          <span></span>
          <span></span>
        </div>

        <div class="reserve-btn"></div>
      </div>

      <div class="main">
        <div class="timeline"></div>

        <div class="detail">
          <div class="detail-line a"></div>
          <div class="detail-line b"></div>
          <div class="detail-line c"></div>
          <div class="detail-line d"></div>
          <div class="detail-line e"></div>
          <div class="detail-line f"></div>
        </div>
      </div>

      <div class="bottom">
        <div class="days">
          <div class="days-head"></div>

          <div class="days-grid">
            <div class="day"></div>
            <div class="day"></div>
            <div class="day"></div>
            <div class="day"></div>
            <div class="day"></div>
            <div class="day"></div>
            <div class="day"></div>
          </div>
        </div>

        <div class="status">
          <div class="status-head"></div>

          <div class="status-row"></div>
          <div class="status-row"></div>
          <div class="status-row"></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
