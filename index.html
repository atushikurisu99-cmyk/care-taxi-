<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>care taxi shell v5</title>
<style>
html,body{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
background:#ffffff;
font-family:sans-serif;
}
#topbar{
position:fixed;
left:0;
top:0;
width:100%;
height:132px;
background:#4d86b7;
}
#shell{
position:fixed;
left:0;
top:132px;
right:0;
bottom:0;
background:#ffffff;
}
.label{
position:absolute;
font-weight:700;
color:#0c9447;
font-size:18px;
}
#loc{left:17%;top:12%;}
#det{right:20%;top:12%;}
#days{left:17%;bottom:18%;}
#status{right:20%;bottom:18%;}
</style>
</head>
<body>
<div id="topbar"></div>
<div id="shell">
<div id="loc" class="label">LOCATION</div>
<div id="det" class="label">DETAIL</div>
<div id="days" class="label">DAYS</div>
<div id="status" class="label">STATUS</div>
</div>
</body>
</html>
