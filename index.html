<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PC Big Box Trace v2</title>
<style>
  :root{
    --bg:#e7f4f7;
    --nav:#05545b;
    --line:#2f3f45;
    --card:#ffffff;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;
    width:100%;
    height:100%;
    background:var(--bg);
    overflow:hidden;
  }
  body{
    font-family:Arial, sans-serif;
  }

  /* PDFスクショのアプリ領域だけを大箱で再現するための固定ステージ */
  .stage{
    position:relative;
    width:994px;
    height:405px;
    margin:0;
    background:var(--bg);
  }

  .nav{
    position:absolute;
    left:0;
    top:0;
    width:193px;
    height:405px;
    background:var(--nav);
  }

  .main{
    position:absolute;
    left:193px;
    top:0;
    width:801px;
    height:405px;
    background:var(--bg);
  }

  .box{
    position:absolute;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:3px;
  }

  .search{
    left:216px;
    top:5px;
    width:245px;
    height:20px;
  }

  .kpi{ top:9px; width:95px; height:52px; }
  .kpi1{ left:602px; }
  .kpi2{ left:704px; }
  .kpi3{ left:806px; }
  .kpi4{ left:908px; width:86px; }

  .case{
    left:214px;
    top:68px;
    width:598px;
    height:236px;
  }

  .detail{
    left:820px;
    top:68px;
    width:177px;
    height:326px;
  }

  .memo{
    left:214px;
    top:311px;
    width:310px;
    height:84px;
  }

  .quick{
    left:534px;
    top:311px;
    width:278px;
    height:84px;
  }
</style>
</head>
<body>
  <div class="stage" aria-label="PC dashboard big box trace">
    <div class="nav"></div>
    <div class="main"></div>

    <div class="box search"></div>
    <div class="box kpi kpi1"></div>
    <div class="box kpi kpi2"></div>
    <div class="box kpi kpi3"></div>
    <div class="box kpi kpi4"></div>

    <div class="box case"></div>
    <div class="box detail"></div>
    <div class="box memo"></div>
    <div class="box quick"></div>
  </div>
</body>
</html>
