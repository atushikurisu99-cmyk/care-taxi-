<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Care Taxi UI</title>
<style>
body { margin:0; font-family:sans-serif; background:#e5e7eb; }
.header { background:#5da8c7; color:white; display:flex; justify-content:space-between; padding:20px; font-size:32px; font-weight:bold; }
.timeline { background:white; margin:10px; padding:10px; position:relative; height:300px; }
.time-row { display:flex; font-size:12px; }
.time-cell { flex:1; text-align:center; }
.red-line { position:absolute; top:0; bottom:0; width:2px; background:red; }
.booking { position:absolute; background:orange; color:white; border-radius:20px; padding:5px 10px; font-size:14px; }
.bottom { display:flex; gap:10px; margin:10px; }
.two-week { flex:2; background:#cfe7f3; padding:10px; }
.drivers { flex:1; background:#cfe7f3; padding:10px; }
</style>
</head>

<body>

<div class="header">
  <div>2026/04/21</div>
  <div id="clock"></div>
</div>

<div class="timeline">
  <div class="time-row">
    <div class="time-cell">7:00</div>
    <div class="time-cell">8:00</div>
    <div class="time-cell">9:00</div>
    <div class="time-cell">10:00</div>
    <div class="time-cell">11:00</div>
    <div class="time-cell">12:00</div>
    <div class="time-cell">13:00</div>
    <div class="time-cell">14:00</div>
    <div class="time-cell">15:00</div>
    <div class="time-cell">16:00</div>
    <div class="time-cell">17:00</div>
    <div class="time-cell">18:00</div>
    <div class="time-cell">19:00</div>
    <div class="time-cell">20:00</div>
  </div>
</div>

<div class="bottom">
  <div class="two-week"><b>2週間分の予定</b></div>
  <div class="drivers">
    <b>協力業者さんの一覧</b><br>
    田中　待機<br>
    佐藤　対応中<br>
    山本　空き<br>
    他20件
  </div>
</div>

<script>
function updateClock(){
  const now=new Date();
  document.getElementById('clock').innerText=
    now.getHours()+':'+String(now.getMinutes()).padStart(2,'0');
}
setInterval(updateClock,1000);
updateClock();
</script>

</body>
</html>
