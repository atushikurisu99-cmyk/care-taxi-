<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>介護タクシー管理アプリ Shell v16</title>
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/location.css">
  <link rel="stylesheet" href="css/detail.css">
  <link rel="stylesheet" href="css/days.css">
  <link rel="stylesheet" href="css/status.css">
</head>
<body>
  <div id="viewport">
    <main id="appCanvas" aria-label="介護タクシー管理アプリ">
      <section id="headerLayer" class="header-layer" aria-label="上部情報帯"></section>
      <section id="locationLayer" class="area-layer location-layer" aria-label="LOCATION"></section>
      <section id="detailLayer" class="area-layer detail-layer" aria-label="DETAIL"></section>
      <section id="daysLayer" class="area-layer days-layer" aria-label="DAYS"></section>
      <section id="statusLayer" class="area-layer status-layer" aria-label="STATUS"></section>
    </main>
  </div>

  <script src="js/layout.js"></script>
  <script src="js/header.js"></script>
  <script src="js/location.js"></script>
  <script src="js/detail.js"></script>
  <script src="js/days.js"></script>
  <script src="js/status.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
