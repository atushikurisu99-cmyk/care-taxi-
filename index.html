<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>CARE TAXI TRACE V15 LANE FIX</title>
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <header class="app-header" aria-label="上部バー">
    <div class="header-inner">
      <button class="hamburger" aria-label="menu"><span></span><span></span><span></span></button>
      <div class="datetime" id="dateTime">5/10（日） 05:14</div>
      <button class="reserve-btn">＋予約登録</button>
    </div>
  </header>

  <main class="viewport" aria-label="介護タクシー管理アプリ">
    <section class="stage-holder">
      <section class="stage" id="stage">
        <section class="location">
          <h2>LOCATION</h2>

          <div class="lane-timeline" aria-label="協力業者別スケジュール">
            <div class="lane-head-name">担当者</div>
            <div class="lane-head-time" id="timelineHead"></div>

            <div class="lane-name-scroll" id="laneNameScroll" aria-label="協力業者名一覧"></div>
            <div class="lane-grid-scroll" id="laneGridScroll" aria-label="協力業者別タイムライン">
              <div class="lane-grid-canvas" id="laneGridCanvas"></div>
            </div>
          </div>
        </section>

        <aside class="detail">
          <h2>DETAIL</h2>
          <div class="detail-list" id="detailList">
            <div>時間</div>
            <div>患者名</div>
            <div>出発 → 到着</div>
            <div>担当</div>
            <div>状態</div>
            <div>特記</div>
            <div class="dash">ーーー</div>
          </div>
        </aside>

        <div class="detail-leg" aria-hidden="true"></div>
        <div class="status-top-line" aria-hidden="true"></div>

        <section class="days">
          <h2>DAYS</h2>
          <div class="day-cards">
            <article class="day-card"><b>4/29</b><p>案件数 8件</p><p>調整数 8件</p><span class="tag ghost"></span><span class="tag ghost"></span></article>
            <article class="day-card"><b>4/30</b><p>案件数 8件</p><p>調整数 7件</p><span class="tag ghost"></span><span class="tag ghost"></span></article>
            <article class="day-card"><b>5/1</b><p>案件数 8件</p><p>調整数 8件</p><span class="tag ghost"></span><span class="tag ghost"></span></article>
            <article class="day-card"><b>5/2</b><p>案件数 8件</p><p>調整数 7件</p><span class="tag ghost"></span><span class="tag ghost"></span></article>
            <article class="day-card"><b>5/3</b><p>案件数 8件</p><p>調整数 8件</p><span class="tag blue">請求書発行</span><span class="tag empty"></span><span class="tag empty"></span></article>
            <article class="day-card"><b>5/4</b><p>案件数 8件</p><p class="alert">調整数 7件</p><span class="tag yellow">支払い</span><span class="tag ghost"></span></article>
            <article class="day-card"><b>5/5</b><p>案件数 8件</p><p>調整数 8件</p><span class="tag ghost"></span><span class="tag ghost"></span></article>
          </div>
        </section>

        <section class="status">
          <h2>STATUS</h2>
          <div class="status-list" id="statusList"></div>
        </section>
      </section>
    </section>
  </main>

  <script src="js/data.js"></script>
  <script src="js/timeline.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
