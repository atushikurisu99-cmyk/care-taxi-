<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>介護タクシー管理</title>

<style>
*{box-sizing:border-box}
html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:#eef2f6;
}

/* ===== 画面 ===== */

.screen{
  width:100vw;
  height:100vh;
  overflow:hidden;
  display:flex;
  flex-direction:column;
}

/* ===== ヘッダー ===== */

.top{
  height:70px;
  background:#1d4ed8;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 20px;
  font-weight:900;
}

.btn{
  background:#fff;
  color:#1d4ed8;
  border-radius:10px;
  padding:10px 14px;
}

/* ===== メイン ===== */

.main{
  flex:1;
  display:flex;
  overflow:hidden;
}

/* ===== タイムライン ===== */

.timeline{
  flex:1;
  display:flex;
  overflow:hidden;
  background:#fff;
}

/* 左列 */
.names{
  width:120px;
  border-right:1px solid #ddd;
  display:flex;
  flex-direction:column;
}

.name{
  height:80px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-bottom:1px solid #eee;
  font-weight:900;
}

/* 右 */
.right{
  flex:1;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* 時間ヘッダー */
.hours{
  height:50px;
  display:grid;
  grid-template-columns:repeat(14,120px);
  border-bottom:1px solid #ddd;
  background:#fff;
  position:sticky;
  top:0;
  z-index:10;
}

.hours div{
  text-align:center;
  padding:10px;
  font-weight:900;
  border-right:1px solid #eee;
}

/* スクロールエリア */
.scroll{
  flex:1;
  overflow:auto;
}

/* グリッド */
.grid{
  display:grid;
  grid-template-columns:repeat(14,120px);
  grid-auto-rows:80px;
}

/* セル */
.cell{
  border-right:1px solid #eee;
  border-bottom:1px solid #eee;
}

/* 予約 */
.appt{
  position:absolute;
  height:60px;
  background:#2563eb;
  color:#fff;
  border-radius:8px;
  padding:6px;
  font-size:12px;
  font-weight:900;
}

/* ===== 詳細 ===== */

.detail{
  width:260px;
  border-left:1px solid #ddd;
  background:#fff;
  padding:16px;
}

/* ===== 下カード ===== */

.bottom{
  height:40px;
  background:#ddd;
  text-align:center;
  line-height:40px;
  font-weight:900;
}

.bottom.open{
  height:200px;
}

.bottomContent{
  display:none;
  height:160px;
  background:#fff;
}

.bottom.open .bottomContent{
  display:flex;
}

.card{
  flex:1;
  padding:10px;
  border-right:1px solid #eee;
}
</style>
</head>

<body>

<div class="screen">

  <div class="top">
    <div>2026/04/21</div>
    <div class="btn">＋予約</div>
  </div>

  <div class="main">

    <div class="timeline">

      <!-- 左 -->
      <div class="names">
        <div class="name">佐藤</div>
        <div class="name">鈴木</div>
        <div class="name">山田</div>
        <div class="name">業者A</div>
        <div class="name">業者B</div>
      </div>

      <!-- 右 -->
      <div class="right">

        <div class="hours">
          <div>7</div><div>8</div><div>9</div><div>10</div>
          <div>11</div><div>12</div><div>13</div><div>14</div>
          <div>15</div><div>16</div><div>17</div><div>18</div>
          <div>19</div><div>20</div>
        </div>

        <div class="scroll">

          <div style="position:relative">

            <div class="grid">
              <!-- 5行分 -->
              <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
              <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
              <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
              <div class="cell"></div><div class="cell"></div>
            </div>

            <div class="appt" style="top:90px; left:120px; width:120px;">
              8:30 田中
            </div>

          </div>

        </div>

      </div>

    </div>

    <div class="detail">
      詳細
    </div>

  </div>

  <div class="bottom" onclick="toggleBottom()">
    ▲
    <div class="bottomContent">
      <div class="card">2週間予定</div>
      <div class="card">業者一覧</div>
    </div>
  </div>

</div>

<script>
function toggleBottom(){
  document.querySelector('.bottom').classList.toggle('open')
}

/* iPadスクロール制御 */
document.addEventListener('touchmove', function(e){
  if(!e.target.closest('.scroll')){
    e.preventDefault()
  }
},{passive:false})
</script>

</body>
</html>
