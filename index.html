<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta
    name="apple-mobile-web-app-status-bar-style"
    content="black-translucent"
  />

  <title>介護タクシー管理UI</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #111;
    }

    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      position: relative;
      background: #111;
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Helvetica Neue",
        sans-serif;
    }

    .app {
      position: relative;
      width: 100vw;
      height: 100vh;
      min-height: -webkit-fill-available;
      background: #ffffff;
      overflow: hidden;
      border: 2px solid #111;
    }

    .safe {
      position: absolute;

      top: 18px;
      left: 22px;
      right: 22px;
      bottom: 18px;

      overflow: hidden;
    }

    .top-bar {
      position: absolute;

      left: 0;
      top: 0;

      width: 100%;
      height: 72px;

      background: #3567c7;

      border-radius: 26px 26px 0 0;
    }

    .menu {
      position: absolute;

      left: 28px;
      top: 18px;

      width: 38px;
      height: 38px;
    }

    .menu span {
      display: block;

      width: 100%;
      height: 4px;

      margin-bottom: 7px;

      background: #ffffff;

      border-radius: 999px;
    }

    .reserve-btn {
      position: absolute;

      right: 26px;
      top: 16px;

      width: 102px;
      height: 40px;

      border-radius: 10px;

      background: #ffffff;

      border: 1px solid rgba(0, 0, 0, 0.25);
    }

    .main {
      position: absolute;

      top: 108px;
      left: 0;
      right: 0;
      bottom: 168px;
    }

    .timeline {
      position: absolute;

      left: 0;
      top: 0;
      bottom: 0;
      right: 238px;

      background: #f7f7f7;

      border: 1px solid rgba(0, 0, 0, 0.45);

      overflow: hidden;
    }

    .timeline-grid {
      position: absolute;

      inset: 0;

      background-image:
        linear-gradient(
          to right,
          rgba(0, 0, 0, 0.08) 1px,
          transparent 1px
        ),
        linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0.08) 1px,
          transparent 1px
        );

      background-size: 72px 64px;
    }

    .detail {
      position: absolute;

      top: 0;
      right: 0;

      width: 210px;
      height: 100%;

      background: #f7f7f7;

      border: 1px solid rgba(0, 0, 0, 0.45);
    }

    .detail-line {
      width: calc(100% - 28px);
      height: 1px;

      margin-left: 14px;

      background: rgba(0, 0, 0, 0.18);
    }

    .detail-line.a {
      margin-top: 88px;
    }

    .detail-line.b {
      margin-top: 42px;
    }

    .detail-line.c {
      margin-top: 42px;
    }

    .detail-line.d {
      margin-top: 42px;
    }

    .detail-line.e {
      margin-top: 78px;
    }

    .detail-line.f {
      margin-top: 78px;
    }

    .bottom {
      position: absolute;

      left: 0;
      right: 0;
      bottom: 0;

      height: 136px;
    }

    .days {
      position: absolute;

      left: 0;
      top: 0;
      bottom: 0;
      right: 238px;

      background: #f7f7f7;

      border: 1px solid rgba(0, 0, 0, 0.45);

      overflow: hidden;
    }

    .days-head {
      width: 100%;
      height: 34px;

      border-bottom: 1px solid rgba(0, 0, 0, 0.25);
    }

    .days-grid {
      display: grid;

      grid-template-columns: repeat(7, 1fr);

      height: calc(100% - 34px);
    }

    .day {
      position: relative;

      border-right: 1px solid rgba(0, 0, 0, 0.12);
    }

    .day:last-child {
      border-right: none;
    }

    .day::before {
      content: "";

      position: absolute;

      left: 14px;
      right: 14px;
      top: 18px;

      height: 18px;

      background: #dce6ff;

      border-radius: 4px;

      border: 1px solid rgba(0, 0, 0, 0.45);
    }

    .day::after {
      content: "";

      position: absolute;

      left: 14px;
      right: 28px;
      top: 52px;

      height: 18px;

      background: #e8f1df;

      border-radius: 4px;

      border: 1px solid rgba(0, 0, 0, 0.45);
    }

    .status {
      position: absolute;

      top: 0;
      right: 0;
      bottom: 0;

      width: 210px;

      background: #f7f7f7;

      border: 1px solid rgba(0, 0, 0, 0.45);

      overflow: hidden;
    }

    .status-head {
      width: 100%;
      height: 34px;

      border-bottom: 1px solid rgba(0, 0, 0, 0.25);
    }

    .status-row {
      position: relative;

      width: 100%;
      height: calc((100% - 34px) / 3);

      border-bottom: 1px solid rgba(0, 0, 0, 0.12);
    }

    .status-row:last-child {
      border-bottom: none;
    }

    .status-row::before {
      content: "";

      position: absolute;

      left: 14px;
      top: 50%;

      width: 88px;
      height: 18px;

      transform: translateY(-50%);

      background: #dce6ff;

      border-radius: 4px;

      border: 1px solid rgba(0, 0, 0, 0.45);
    }

    .status-row::after {
      content: "";

      position: absolute;

      right: 14px;
      top: 50%;

      width: 74px;
      height: 18px;

      transform: translateY(-50%);

      background: #e8f1df;

      border-radius: 4px;

      border: 1px solid rgba(0, 0, 0, 0.45);
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="safe">

      <div class="top-bar">
        <div class="menu">
          <span></span>
          <span></span>
          <span></span>
        </div>

        <div class="reserve-btn"></div>
      </div>

      <div class="main">

        <div class="timeline">
          <div class="timeline-grid"></div>
        </div>

        <div class="detail">
          <div class="detail-line a"></div>
          <div class="detail-line b"></div>
          <div class="detail-line c"></div>
          <div class="detail-line d"></div>
          <div class="detail-line e"></div>
          <div class="detail-line f"></div>
        </div>

      </div>

      <div class="bottom">

        <div class="days">
          <div class="days-head"></div>

          <div class="days-grid">
            <div class="day"></div>
            <div class="day"></div>
            <div class="day"></div>
            <div class="day"></div>
            <div class="day"></div>
            <div class="day"></div>
            <div class="day"></div>
          </div>
        </div>

        <div class="status">
          <div class="status-head"></div>

          <div class="status-row"></div>
          <div class="status-row"></div>
          <div class="status-row"></div>
        </div>

      </div>

    </div>
  </div>
</body>
</html>
