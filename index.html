<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
  />
  <title>Care Taxi Admin UI</title>
  <style>
    :root {
      --bg: #d9dde2;
      --panel-bg: #f7f7f7;
      --line: #a3a3a3;
      --line-light: #c7c7c7;
      --header-blue: #63afd1;
      --sub-blue: #bfd8e7;
      --red: #d91f1f;
      --text: #111;
      --green: #79ab56;
      --orange: #d4a038;
      --blue: #4988c7;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans",
        "Yu Gothic", Meiryo, sans-serif;
      color: var(--text);
    }

    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 0;
    }

    /* PCではiPad比率で中央表示 / iPadでは全画面 */
    .app {
      width: min(100vw, calc(100vh * 1024 / 768));
      height: min(100vh, calc(100vw * 768 / 1024));
      background: var(--bg);
      overflow: hidden;
    }

    @media (pointer: coarse) {
      .app {
        width: 100vw;
        height: 100vh;
      }
    }

    .screen {
      width: 100%;
      height: 100%;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow: hidden;
    }

    .header {
      height: 74px;
      flex: 0 0 74px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    /* 将来グループ名も入る前提 */
    .date-band {
      flex: 0 0 63%;
      height: 48px;
      background: var(--header-blue);
      border-radius: 0 22px 22px 0;
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 18px;
      overflow: hidden;
      white-space: nowrap;
    }

    .date-text {
      font-size: 32px;
      font-weight: 900;
      line-height: 1;
      flex: 0 0 auto;
    }

    .group-text {
      flex: 1 1 auto;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 22px;
      font-weight: 800;
      line-height: 1;
    }

    .clock-wrap {
      flex: 1 1 auto;
      display: flex;
      justify-content: flex-end;
      align-items: flex-start;
      padding-right: 2px;
      min-width: 0;
    }

    .clock {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      line-height: 1;
      white-space: nowrap;
    }

    .ampm {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      font-weight: 900;
      line-height: 0.85;
      padding-top: 8px;
    }

    .clock-time {
      font-size: 52px;
      font-weight: 900;
      font-family: Georgia, "Times New Roman", serif;
      line-height: 1;
      letter-spacing: 0.5px;
    }

    .schedule-panel {
      flex: 0 0 355px;
      height: 355px;
      background: var(--panel-bg);
      border: 1px solid #d3d3d3;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .time-header {
      flex: 0 0 46px;
      height: 46px;
      margin: 0 10px;
      border-bottom: 1px solid var(--line);
      display: grid;
      grid-template-columns: repeat(14, 1fr);
      align-items: center;
      text-align: center;
      font-size: 13px;
      font-weight: 700;
      background: transparent;
      z-index: 3;
    }

    .grid-wrap {
      flex: 1 1 auto;
      margin: 0 10px 10px;
      position: relative;
      overflow: hidden;
      background: #f8f8f8;
    }

    .grid-vertical,
    .grid-horizontal,
    .now-line,
    .booking-layer {
      position: absolute;
      inset: 0;
    }

    .grid-vertical {
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(14, 1fr);
    }

    .grid-vertical > div {
      border-left: 1px solid var(--line);
    }

    .grid-vertical > div:last-child {
      border-right: 1px solid var(--line);
    }

    .grid-horizontal {
      z-index: 1;
      display: grid;
      grid-template-rows: repeat(10, 1fr);
    }

    .grid-horizontal > div {
      border-top: 1px solid var(--line);
    }

    .grid-horizontal > div:last-child {
      border-bottom: 1px solid var(--line);
    }

    .now-line {
      z-index: 2;
      pointer-events: none;
    }

    .now-line::before {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      left: var(--now-left, 50%);
      width: 2px;
      background: var(--red);
      transform: translateX(-1px);
    }

    .booking-layer {
      z-index: 3;
      pointer-events: none;
    }

    .booking {
      position: absolute;
      height: 44px;
      border-radius: 18px;
      border: 2px solid rgba(0, 0, 0, 0.6);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 0 12px;
      font-size: 14px;
      font-weight: 800;
      line-height: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: clip;
      box-shadow: inset 0 -1px 0 rgba(0, 0, 0, 0.08);
    }

    .booking .start,
    .booking .end {
      flex: 0 0 auto;
      min-width: 20px;
      text-align: center;
    }

    .booking .center {
      flex: 1 1 auto;
      min-width: 0;
      overflow: hidden;
      text-overflow: clip;
      white-space: nowrap;
    }

    .bottom-row {
      flex: 1 1 auto;
      min-height: 0;
      display: grid;
      grid-template-columns: 63.5% 36.5%;
      gap: 8px;
      overflow: hidden;
    }

    .sub-panel {
      background: var(--sub-blue);
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }

    .sub-title {
      flex: 0 0 44px;
      display: flex;
      align-items: center;
      padding: 0 12px;
      font-size: 18px;
      font-weight: 900;
      border-bottom: 1px solid rgba(0, 0, 0, 0.08);
    }

    .two-week-body {
      flex: 1 1 auto;
      margin: 0 10px 10px;
      background: rgba(255, 255, 255, 0.28);
      border: 1px solid #c4d0d7;
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      overflow: hidden;
    }

    .day-col {
      border-right: 1px solid #c4d0d7;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .day-col:last-child {
      border-right: 0;
    }

    .day-head {
      height: 38px;
      flex: 0 0 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 800;
      border-bottom: 1px solid #c4d0d7;
      background: rgba(255, 255, 255, 0.18);
    }

    .day-body {
      flex: 1 1 auto;
      position: relative;
      border-top: 0;
    }

    .day-body::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to bottom, rgba(0,0,0,0.06) 1px, transparent 1px) 0 0 / 100% 25%;
      pointer-events: none;
    }

    .mini-bar {
      position: absolute;
      left: 12px;
      right: 12px;
      height: 20px;
    }

    .drivers-body {
      flex: 1 1 auto;
      margin: 0 10px 10px;
      background: rgba(255, 255, 255, 0.28);
      border: 1px solid #c4d0d7;
      padding: 8px 10px;
      overflow: hidden;
    }

    .driver-row {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      font-size: 16px;
      font-weight: 800;
      padding: 10px 0;
      border-bottom: 1px solid rgba(0, 0, 0, 0.08);
    }

    .other-row {
      font-size: 16px;
      font-weight: 800;
      padding-top: 10px;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="screen">
      <header class="header">
        <div class="date-band">
          <div class="date-text" id="dateText">2026/04/21</div>
          <div class="group-text" id="groupText"></div>
        </div>
        <div class="clock-wrap">
          <div class="clock">
            <div class="ampm" id="ampm">PM</div>
            <div class="clock-time" id="clockText">12:01</div>
          </div>
        </div>
      </header>

      <section class="schedule-panel">
        <div class="time-header" id="timeHeader"></div>
        <div class="grid-wrap">
          <div class="grid-vertical" id="gridVertical"></div>
          <div class="grid-horizontal" id="gridHorizontal"></div>
          <div class="now-line" id="nowLine"></div>
          <div class="booking-layer" id="bookingLayer"></div>
        </div>
      </section>

      <section class="bottom-row">
        <div class="sub-panel">
          <div class="sub-title">2週間分の予定</div>
          <div class="two-week-body" id="twoWeekBody"></div>
        </div>

        <div class="sub-panel">
          <div class="sub-title">協力業者さんの一覧</div>
          <div class="drivers-body" id="driversBody"></div>
        </div>
      </section>
    </div>
  </div>

  <script>
    const scheduleStartHour = 7;
    const scheduleEndHour = 20;

    const bookings = [
      {
        start: "2026-04-21T08:00:00",
        end: "2026-04-21T10:10:00",
        patient: "佐藤 様",
        destination: "A 病院",
        row: 2,
        color: getComputedStyle(document.documentElement).getPropertyValue("--green").trim()
      },
      {
        start: "2026-04-21T10:50:00",
        end: "2026-04-21T14:40:00",
        patient: "鈴木 様",
        destination: "R クリニック",
        row: 4,
        color: getComputedStyle(document.documentElement).getPropertyValue("--orange").trim()
      },
      {
        start: "2026-04-21T12:40:00",
        end: "2026-04-21T15:30:00",
        patient: "山田 様",
        destination: "C 病院",
        row: 6,
        color: getComputedStyle(document.documentElement).getPropertyValue("--blue").trim()
      }
    ];

    const twoWeek = [
      { date: "4/20", bars: [{ row: 0, color: "#6eb2dd" }, { row: 1, color: "#ea8d2e" }] },
      { date: "4/21", bars: [{ row: 0, color: "#4e8bd8" }, { row: 1, color: "#83c140" }] },
      { date: "4/22", bars: [{ row: 0, color: "#6eb2dd" }] },
      { date: "4/22", bars: [{ row: 0, color: "#6eb2dd" }, { row: 1, color: "#83c140" }] },
      { date: "4/23", bars: [{ row: 0, color: "#de7d72" }] },
      { date: "4/24", bars: [{ row: 0, color: "#4e8bd8" }] },
      { date: "4/25", bars: [{ row: 0, color: "#4e8bd8" }] }
    ];

    const drivers = [
      { name: "田中", status: "待機" },
      { name: "佐藤", status: "対応中" },
      { name: "山本", status: "空き" }
    ];

    const timeHeader = document.getElementById("timeHeader");
    const gridVertical = document.getElementById("gridVertical");
    const gridHorizontal = document.getElementById("gridHorizontal");
    const bookingLayer = document.getElementById("bookingLayer");
    const nowLine = document.getElementById("nowLine");
    const dateText = document.getElementById("dateText");
    const ampm = document.getElementById("ampm");
    const clockText = document.getElementById("clockText");
    const twoWeekBody = document.getElementById("twoWeekBody");
    const driversBody = document.getElementById("driversBody");

    function pad2(n) {
      return String(n).padStart(2, "0");
    }

    function minuteFromStart(dateStr) {
      const d = new Date(dateStr);
      return (d.getHours() - scheduleStartHour) * 60 + d.getMinutes();
    }

    function renderAxis() {
      timeHeader.innerHTML = "";
      gridVertical.innerHTML = "";
      gridHorizontal.innerHTML = "";

      for (let h = scheduleStartHour; h <= scheduleEndHour; h++) {
        const span = document.createElement("span");
        span.textContent = `${h}:00`;
        timeHeader.appendChild(span);

        const v = document.createElement("div");
        gridVertical.appendChild(v);
      }

      for (let i = 0; i < 10; i++) {
        const row = document.createElement("div");
        gridHorizontal.appendChild(row);
      }
    }

    function renderBookings() {
      bookingLayer.innerHTML = "";
      const total = (scheduleEndHour - scheduleStartHour) * 60;
      const topStart = 76;
      const rowStep = 57;

      bookings.forEach((item) => {
        const startDate = new Date(item.start);
        const endDate = new Date(item.end);
        const left = (minuteFromStart(item.start) / total) * 100;
        const width = ((minuteFromStart(item.end) - minuteFromStart(item.start)) / total) * 100;

        const el = document.createElement("div");
        el.className = "booking";
        el.style.left = `${left}%`;
        el.style.width = `${width}%`;
        el.style.top = `${topStart + (item.row * rowStep) / 2}px`;
        el.style.background = item.color;

        el.innerHTML = `
          <span class="start">${pad2(startDate.getMinutes())}</span>
          <span class="center">${item.patient}　${item.destination}</span>
          <span class="end">${pad2(endDate.getMinutes())}</span>
        `;

        bookingLayer.appendChild(el);
      });
    }

    function renderTwoWeek() {
      twoWeekBody.innerHTML = "";

      twoWeek.forEach((day) => {
        const col = document.createElement("div");
        col.className = "day-col";

        const head = document.createElement("div");
        head.className = "day-head";
        head.textContent = day.date;

        const body = document.createElement("div");
        body.className = "day-body";

        day.bars.forEach((bar) => {
          const mini = document.createElement("div");
          mini.className = "mini-bar";
          mini.style.background = bar.color;
          mini.style.top = `${16 + bar.row * 28}px`;
          body.appendChild(mini);
        });

        col.appendChild(head);
        col.appendChild(body);
        twoWeekBody.appendChild(col);
      });
    }

    function renderDrivers() {
      driversBody.innerHTML = "";

      drivers.forEach((item) => {
        const row = document.createElement("div");
        row.className = "driver-row";
        row.innerHTML = `<span>${item.name}</span><span>${item.status}</span>`;
        driversBody.appendChild(row);
      });

      const other = document.createElement("div");
      other.className = "other-row";
      other.textContent = "他20件";
      driversBody.appendChild(other);
    }

    function refreshNow() {
      const now = new Date();

      dateText.textContent = `${now.getFullYear()}/${pad2(now.getMonth() + 1)}/${pad2(now.getDate())}`;

      const hour24 = now.getHours();
      const minute = pad2(now.getMinutes());
      const hour12 = ((hour24 + 11) % 12) + 1;

      ampm.textContent = hour24 >= 12 ? "PM" : "AM";
      clockText.textContent = `${hour12}:${minute}`;

      const mins = (hour24 - scheduleStartHour) * 60 + now.getMinutes();
      const total = (scheduleEndHour - scheduleStartHour) * 60;
      const left = Math.max(0, Math.min(100, (mins / total) * 100));
      nowLine.style.setProperty("--now-left", `${left}%`);
    }

    renderAxis();
    renderBookings();
    renderTwoWeek();
    renderDrivers();
    refreshNow();
    setInterval(refreshNow, 1000);
  </script>
</body>
</html>
