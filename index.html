<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>介護タクシー管理アプリ</title>
  <link rel="stylesheet" href="./css/reset.css">
  <link rel="stylesheet" href="./css/layout.css">
  <link rel="stylesheet" href="./css/header.css">
  <link rel="stylesheet" href="./css/areas.css">
</head>
<body>
  <div id="header-bg" aria-hidden="true"></div>

  <main id="viewport" aria-label="介護タクシー管理アプリ">
    <section id="stage">
      <header id="header-content" aria-label="上部情報">
        <button class="hamburger" type="button" aria-label="メニュー">
          <span></span><span></span><span></span>
        </button>
        <div class="header-date">5/10（日）</div>
        <div class="header-time">05:14</div>
        <button class="booking-button" type="button">＋予約登録</button>
      </header>

      <section class="area-label area-location" aria-label="LOCATION">LOCATION</section>
      <section class="area-label area-detail" aria-label="DETAIL">DETAIL</section>
      <section class="area-label area-days" aria-label="DAYS">DAYS</section>
      <section class="area-label area-status" aria-label="STATUS">STATUS</section>

      <section class="area-slot slot-location" aria-hidden="true"></section>
      <section class="area-slot slot-detail" aria-hidden="true"></section>
      <section class="area-slot slot-days" aria-hidden="true"></section>
      <section class="area-slot slot-status" aria-hidden="true"></section>
    </section>
  </main>

  <script src="./js/app.js"></script>
</body>
</html>
