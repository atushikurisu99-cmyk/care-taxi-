<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>介護タクシー管理UI</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    }

    body {
      position: fixed;
      inset: 0;
    }

    .app {
      position: relative;
      width: 100vw;
      height: 100dvh;
      background: #ffffff;
      overflow: hidden;
      border: 2px solid #111;
    }

    .safe {
      position: absolute;
      inset: 18px 22px 18px 22px;
      overflow: hidden;
    }

    .top-bar {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 64px;
      background: #2f76ff;
      border-radius: 2px;
    }

    .menu {
      position: absolute;
      left: 18px;
      top: 14px;
      width: 36px;
      height: 36px;
    }

    .menu span {
      display: block;
      height: 4px;
      margin: 7px 0;
      background: #111;
      border-radius: 4px;
    }

    .reserve-btn {
      position: absolute;
      right: 18px;
      top: 10px;
      width: 118px;
      height: 44px;
      background: #ffffff;
      border: 2px solid #111;
      border-radius: 10px;
    }

    .main {
      position: absolute;
      left: 0;
      right: 0;
      top: 84px;
      bottom: 168px;
    }

    .timeline {
      position: absolute;
      left: 0;
      top: 0;
      right: 280px;
      bottom: 0;
      border: 2px solid #111;
      background: #fff;
      overflow: hidden;
    }

    .vendor-col {
      position: absolute;
      left: 0;
      top: 0;
      width: 120px;
      height: 100%;
      border-right: 2px solid #111;
      background: #f8f8f8;
    }

    .vendor-row {
      height: calc(100% / 7);
      border-bottom: 1px solid #999;
    }

    .grid {
      position: absolute;
      left: 120px;
      top: 0;
      right: 0;
      bottom: 0;
      background-image:
        linear-gradient(to right, rgba(0,0,0,.22) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(0,0,0,.22) 1px, transparent 1px);
      background-size: 72px calc(100% / 7);
    }

    .job {
      position: absolute;
      height: 34px;
      border: 2px solid #111;
      border-radius: 4px;
      background: #e8efff;
    }

    .job.a {
      left: 170px;
      top: 68px;
      width: 150px;
    }

    .job.b {
      left: 300px;
      top: 160px;
      width: 180px;
      background: #edf6e6;
    }

    .job.c {
      left: 430px;
      top: 252px;
      width: 160px;
      background: #fff2d8;
    }

    .detail {
      position: absolute;
      right: 0;
      top: 0;
      width: 260px;
      height: 100%;
      border: 2px solid #111;
      background: #ffffff;
    }

    .detail-title {
      height: 46px;
      border-bottom: 2px solid #111;
      background: #f1f1f1;
    }

    .detail-line {
      height: 44px;
      border-bottom: 1px solid #aaa;
      margin: 0 14px;
    }

    .detail-large {
      height: 76px;
    }

    .bottom {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 148px;
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 18px;
    }

    .days {
      border: 2px solid #111;
      background: #ffffff;
      border-radius: 2px;
      overflow: hidden;
    }

    .days-head {
      height: 34px;
      border-bottom: 2px solid #111;
      background: #f1f1f1;
    }

    .days-grid {
      height: calc(100% - 34px);
      display: grid;
      grid-template-columns: repeat(7, 1fr);
    }

    .day {
      border-right: 1px solid #aaa;
      position: relative;
    }

    .day::before {
      content: "";
      position: absolute;
      left: 12px;
      right: 12px;
      top: 18px;
      height: 18px;
      background: #e8efff;
      border: 1px solid #111;
      border-radius: 3px;
    }

    .day::after {
      content: "";
      position: absolute;
      left: 12px;
      right: 28px;
      top: 52px;
      height: 18px;
      background: #edf6e6;
      border: 1px solid #111;
      border-radius: 3px;
    }

    .status {
      border: 2px solid #111;
      background: #ffffff;
      border-radius: 2px;
      overflow: hidden;
    }

    .status-head {
      height: 34px;
      border-bottom: 2px solid #111;
      background: #f1f1f1;
    }

    .status-row {
      height: calc((100% - 34px) / 3);
      border-bottom: 1px solid #aaa;
      position: relative;
    }

    .status-row::before {
      content: "";
      position: absolute;
      left: 14px;
      top: 50%;
      width: 86px;
      height: 18px;
      transform: translateY(-50%);
      background: #e8efff;
      border: 1px solid #111;
      border-radius: 3px;
    }

    .status-row::after {
      content: "";
      position: absolute;
      right: 14px;
      top: 50%;
      width: 74px;
      height: 18px;
      transform: translateY(-50%);
      background: #edf6e6;
      border: 1px solid #111;
      border-radius: 3px;
    }

    @media (max-width: 900px) {
      .safe {
        inset: 14px 16px 14px 16px;
      }

      .timeline {
        right: 248px;
      }

      .detail {
        width: 232px;
      }

      .bottom {
        grid-template-columns: 1fr 248px;
        gap: 14px;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="safe">
      <div class="top-bar">
        <div class="menu">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <div class="reserve-btn"></div>
      </div>

      <main class="main">
        <section class="timeline">
          <div class="vendor-col">
            <div class="vendor-row"></div>
            <div class="vendor-row"></div>
            <div class="vendor-row"></div>
            <div class="vendor-row"></div>
            <div class="vendor-row"></div>
            <div class="vendor-row"></div>
            <div class="vendor-row"></div>
          </div>

          <div class="grid"></div>

          <div class="job a"></div>
          <div class="job b"></div>
          <div class="job c"></div>
        </section>

        <aside class="detail">
          <div class="detail-title"></div>
          <div class="detail-line"></div>
          <div class="detail-line"></div>
          <div class="detail-line"></div>
          <div class="detail-line"></div>
          <div class="detail-line detail-large"></div>
          <div class="detail-line detail-large"></div>
        </aside>
      </main>

      <section class="bottom">
        <div class="days">
          <div class="days-head"></div>
          <div class="days-grid">
            <div class="day"></div>
            <div class="day"></div>
            <div class="day"></div>
            <div class="day"></div>
            <div class="day"></div>
            <div class="day"></div>
            <div class="day"></div>
          </div>
        </div>

        <div class="status">
          <div class="status-head"></div>
          <div class="status-row"></div>
          <div class="status-row"></div>
          <div class="status-row"></div>
        </div>
      </section>
    </div>
  </div>
</body>
</html>
