<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>介護タクシー管理アプリ｜確認用モック</title>

<style>
*{box-sizing:border-box}

html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:#eef2f6;
  color:#172033;
}

.screen{
  width:100vw;
  height:100vh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* ===== iPad ===== */

.ipad-shell{
  width:100%;
  height:100%;
  border:10px solid #111827;
  border-radius:36px;
  overflow:hidden;
  background:#fff;
  display:flex;
  flex-direction:column;
}

/* 上 */

.ipad-top{
  height:76px;
  background:#1d4ed8;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 20px;
  font-weight:900;
}

/* メイン */

.ipad-main{
  flex:1;
  display:flex;
  overflow:hidden;
}

/* ===== タイムライン ===== */

.timeline{
  flex:1;
  display:flex;
  overflow:hidden;
}

/* 左固定 */

.timeline-left{
  width:130px;
  display:flex;
  flex-direction:column;
  border-right:1px solid #ddd;
  background:#f8fafc;
}

.timeline-label{
  height:60px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:900;
  border-bottom:1px solid #ddd;
}

.row-name{
  height:78px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-bottom:1px solid #eee;
  font-weight:900;
}

/* 右 */

.timeline-right{
  flex:1;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* 横スクロール */

.timeline-x{
  overflow-x:auto;
  overflow-y:hidden;
}

/* 時間 */

.hours{
  display:grid;
  grid-template-columns:repeat(14,120px);
  border-bottom:1px solid #ddd;
  background:#fff;
  position:sticky;
  top:0;
  z-index:10;
}

.hours div{
  text-align:center;
  padding:14px;
  font-weight:900;
  border-right:1px solid #eee;
}

/* 縦スクロール */

.timeline-y{
  height:100%;
  overflow-y:auto;
}

/* グリッド */

.grid{
  position:relative;
  display:grid;
  grid-template-columns:repeat(14,120px);
  grid-auto-rows:78px;
}

.cell{
  border-right:1px solid #eee;
  border-bottom:1px solid #eee;
}

/* 予約 */

.appt{
  position:absolute;
  height:60px;
  background:#2563eb;
  color:#fff;
  border-radius:10px;
  padding:6px;
  font-size:12px;
  font-weight:900;
}

/* ===== 詳細 ===== */

.detail{
  width:300px;
  border-left:1px solid #ddd;
  padding:20px;
  background:#fff;
}

/* ===== 下カード ===== */

.ipad-bottom{
  height:40px;
  background:#ddd;
  text-align:center;
  line-height:40px;
  font-weight:900;
  transition:.3s;
  overflow:hidden;
}

.ipad-bottom.open{
  height:160px;
}

.bottom-inner{
  display:none;
  height:120px;
  background:#fff;
}

.ipad-bottom.open .bottom-inner{
  display:flex;
}

.card{
  flex:1;
  padding:10px;
  border-right:1px solid #eee;
}

/* ===== PC（そのまま） ===== */

.pc{
  display:none;
}
</style>
</head>

<body>

<div class="screen">

<div class="ipad-shell">

  <div class="ipad-top">
    <div>2026/04/21</div>
    <div>＋予約</div>
  </div>

  <div class="ipad-main">

    <!-- タイムライン -->
    <div class="timeline">

      <!-- 左 -->
      <div class="timeline-left">
        <div class="timeline-label">担当</div>
        <div class="row-name">佐藤 太郎</div>
        <div class="row-name">鈴木 花子</div>
        <div class="row-name">山田 一郎</div>
        <div class="row-name">協力業者A</div>
        <div class="row-name">協力業者B</div>
        <div class="row-name">協力業者C</div>
      </div>

      <!-- 右 -->
      <div class="timeline-right">

        <div class="timeline-x">

          <div class="hours">
            <div>7:00</div><div>8:00</div><div>9:00</div><div>10:00</div>
            <div>11:00</div><div>12:00</div><div>13:00</div><div>14:00</div>
            <div>15:00</div><div>16:00</div><div>17:00</div><div>18:00</div>
            <div>19:00</div><div>20:00</div>
          </div>

          <div class="timeline-y">

            <div class="grid">

              <!-- 5行分 -->
              <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
              <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
              <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
              <div class="cell"></div><div class="cell"></div>

              <div class="appt" style="top:20px; left:120px; width:120px;">
                田中
              </div>

            </div>

          </div>

        </div>

      </div>

    </div>

    <!-- 詳細 -->
    <div class="detail">
      詳細
    </div>

  </div>

  <!-- 下 -->
  <div class="ipad-bottom" onclick="this.classList.toggle('open')">
    ▲
    <div class="bottom-inner">
      <div class="card">2週間予定</div>
      <div class="card">業者一覧</div>
    </div>
  </div>

</div>

</div>

<script>
document.addEventListener('touchmove', function(e){
  if(!e.target.closest('.timeline-x') && !e.target.closest('.timeline-y')){
    e.preventDefault();
  }
},{passive:false});
</script>

</body>
</html>
