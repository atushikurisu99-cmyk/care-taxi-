<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>介護タクシー管理アプリ</title>
  <link rel="stylesheet" href="./css/reset.css">
  <link rel="stylesheet" href="./css/layout.css">
  <link rel="stylesheet" href="./css/header.css">
  <link rel="stylesheet" href="./css/areas.css">
</head>
<body>
  <div id="app">
    <header class="app-header" aria-label="上部情報帯">
      <div class="header-inner">
        <button class="menu-button" aria-label="メニュー"><span></span><span></span><span></span></button>
        <div class="header-date">5/10（日）</div>
        <div class="header-time">05:14</div>
        <button class="reserve-button">＋予約登録</button>
      </div>
    </header>

    <main class="stage-wrap" aria-label="固定比率UIキャンバス">
      <section class="stage" id="stage">
        <div class="area-label location-label">LOCATION</div>
        <div class="area-label detail-label">DETAIL</div>
        <div class="area-label days-label">DAYS</div>
        <div class="area-label status-label">STATUS</div>

        <div class="area area-location" aria-label="LOCATIONエリア"></div>
        <div class="area area-detail" aria-label="DETAILエリア"></div>

        <div class="area area-days" aria-label="DAYSエリア">
          <div class="days-grid" aria-label="7日カード">
            <article class="day-card"><div class="day-date">5/10</div><div class="day-spacer"></div><div>案件 8</div><div>調整 1</div><div>未請求 2</div><div>未入金 1</div><div class="day-muted">—</div></article>
            <article class="day-card"><div class="day-date">5/11</div><div class="day-spacer"></div><div>案件 6</div><div>調整 0</div><div>確認 1</div><div class="day-muted">—</div><div class="day-muted">—</div></article>
            <article class="day-card"><div class="day-date">5/12</div><div class="day-spacer"></div><div>案件 9</div><div>調整 2</div><div>要調整</div><div>請求前</div><div class="day-muted">—</div></article>
            <article class="day-card"><div class="day-date">5/13</div><div class="day-spacer"></div><div>案件 5</div><div>調整 0</div><div class="day-muted">—</div><div class="day-muted">—</div><div class="day-muted">—</div></article>
            <article class="day-card"><div class="day-date">5/14</div><div class="day-spacer"></div><div>案件 7</div><div>調整 1</div><div>未支払</div><div class="day-muted">—</div><div class="day-muted">—</div></article>
            <article class="day-card"><div class="day-date">5/15</div><div class="day-spacer"></div><div>案件 4</div><div>調整 0</div><div class="day-muted">—</div><div class="day-muted">—</div><div class="day-muted">—</div></article>
            <article class="day-card"><div class="day-date">5/16</div><div class="day-spacer"></div><div>案件 3</div><div>調整 0</div><div>仮予約</div><div class="day-muted">—</div><div class="day-muted">—</div></article>
          </div>
        </div>

        <div class="area area-status" aria-label="STATUSエリア">
          <div class="status-grid" aria-label="搬送対応状況">
            <div>広島ケア</div><div>待機中</div>
            <div>あおば</div><div>向かい中</div>
            <div>みらい</div><div>搬送中</div>
            <div>さくら</div><div>終了</div>
            <div>ひかり</div><div>待機中</div>
            <div>中央</div><div>確認中</div>
            <div>西部</div><div>終了</div>
          </div>
        </div>
      </section>
    </main>
  </div>
  <script src="./js/scale.js"></script>
</body>
</html>
