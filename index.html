
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<link rel="stylesheet" href="css/styles.css">
<title>介護タクシー</title>
</head>
<body>
<div id="topBand"></div>

<div id="app">

<div class="topbar"></div>

<div class="location-title">LOCATION</div>
<div class="detail-title">DETAIL</div>
<div class="days-title">DAYS</div>
<div class="status-title">STATUS</div>

<div class="timeline">
  <div class="timeline-grid">
    <div class="row"></div>
    <div class="row"></div>
    <div class="row"></div>
    <div class="row"></div>
    <div class="row"></div>
    <div class="row"></div>
    <div class="row"></div>
  </div>
  <div class="scrollbar"></div>
</div>

<div class="detail"></div>

<div class="days">
  <div class="day"><div class="day-date">4/29</div><div class="day-text">案件数 8件<br>調整数 8件</div></div>
  <div class="day"><div class="day-date">4/30</div><div class="day-text">案件数 8件<br>調整数 7件</div></div>
  <div class="day"><div class="day-date">5/1</div><div class="day-text">案件数 8件<br>調整数 8件</div></div>
</div>

<div class="status">
  <div class="status-row"><span>協力業者A</span><span>待機</span></div>
  <div class="status-row"><span>協力業者B</span><span>向かい中</span></div>
  <div class="status-row"><span>協力業者C</span><span>向かい中</span></div>
  <div class="status-row"><span>協力業者D</span><span>搬送中</span></div>
  <div class="status-row"><span>協力業者E</span><span>終了</span></div>
  <div class="status-row"><span>協力業者F</span><span>終了</span></div>
  <div class="status-row"><span>協力業者G</span><span>終了</span></div>
</div>

</div>
</body>
</html>
