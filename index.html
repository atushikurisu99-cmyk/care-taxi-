<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>介護タクシー管理</title>

<style>
*{box-sizing:border-box}

html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:sans-serif;
  background:#eef2f6;
}

/* ========= 共通 ========= */
.screen{
  display:none;
  width:100%;
  height:100%;
}
.screen.active{display:block}

/* ========= iPad ========= */
.ipad{
  display:flex;
  flex-direction:column;
  height:100%;
}

/* 上 */
.top{
  height:70px;
  background:#1d4ed8;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 16px;
  font-weight:900;
}

.top button{
  height:44px;
  border:0;
  border-radius:10px;
  padding:0 12px;
}

/* 中央 */
.main{
  flex:1;
  display:grid;
  grid-template-columns:120px 1fr 260px;
  overflow:hidden;
}

/* 左（固定） */
.names{
  background:#f8fafc;
}

.name{
  height:70px;
  border-bottom:1px solid #ccc;
  padding:10px;
  font-weight:900;
}

/* 中央（横スクロール） */
.timeline{
  overflow-x:auto;
  overflow-y:hidden;
  background:#fff;
}

.timeline-inner{
  min-width:1200px;
  position:relative;
}

.row{
  height:70px;
  border-bottom:1px solid #ccc;
  position:relative;
}

.slot{
  position:absolute;
  top:10px;
  height:50px;
  background:#2563eb;
  color:#fff;
  border-radius:8px;
  padding:6px;
  font-size:12px;
}

/* 右 */
.detail{
  border-left:1px solid #ccc;
  padding:10px;
}

/* 下（格納） */
.bottom{
  background:#fff;
  border-top:1px solid #ccc;
  transition:.2s;
}

.bottom.closed{
  height:40px;
}

.bottom.open{
  height:160px;
}

.toggle{
  height:40px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:900;
  border-bottom:1px solid #ddd;
  background:#f1f5f9;
}

.bottom-content{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
}

/* ========= PC ========= */
.pc{
  display:flex;
  height:100%;
}

.sidebar{
  width:220px;
  background:#14532d;
  color:#fff;
  padding:20px;
}

.main-pc{
  flex:1;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

.header{
  padding:10px;
  background:#fff;
  border-bottom:1px solid #ccc;
}

.table{
  flex:1;
  overflow-x:auto;
  overflow-y:hidden;
}

table{
  min-width:1200px;
  border-collapse:collapse;
}

td,th{
  border:1px solid #ccc;
  padding:6px;
}
</style>
</head>

<body>

<!-- iPad -->
<div id="ipad" class="screen active ipad">

  <div class="top">
    <div>2026/04/21</div>
    <div>
      <button onclick="location.href='booking-input.html'">＋予約</button>
      <button onclick="location.href='settings.html'">設定</button>
    </div>
  </div>

  <div class="main">

    <div class="names">
      <div class="name">佐藤</div>
      <div class="name">鈴木</div>
      <div class="name">山田</div>
    </div>

    <div class="timeline">
      <div class="timeline-inner">

        <div class="row">
          <div class="slot" style="left:100px;width:120px">田中</div>
        </div>

        <div class="row">
          <div class="slot" style="left:300px;width:120px">鈴木</div>
        </div>

        <div class="row">
          <div class="slot" style="left:500px;width:120px">佐藤</div>
        </div>

      </div>
    </div>

    <div class="detail">
      詳細
    </div>

  </div>

  <div id="bottom" class="bottom open">
    <div class="toggle" onclick="toggleBottom()">予定・業者 ▲</div>
    <div class="bottom-content">
      <div>2週間予定</div>
      <div>業者一覧</div>
    </div>
  </div>

</div>

<!-- PC -->
<div id="pc" class="screen pc">

  <div class="sidebar">
    メニュー
  </div>

  <div class="main-pc">
    <div class="header">
      <button onclick="location.href='booking-input.html'">＋新規</button>
      <button onclick="location.href='settings.html'">設定</button>
    </div>

    <div class="table">
      <table>
        <tr><th>日付</th><th>名前</th><th>金額</th></tr>
        <tr><td>4/21</td><td>田中</td><td>4000</td></tr>
      </table>
    </div>
  </div>

</div>

<script>
function toggleBottom(){
  const el=document.getElementById("bottom")
  el.classList.toggle("open")
  el.classList.toggle("closed")
}
</script>

</body>
</html>
