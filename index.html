<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PC Layout Engine Separate Scale v1</title>
<style>
  *{ box-sizing:border-box; }
  html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#dfeff3;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif;
  }
  .stage{
    position:relative;
    width:100vw;
    height:100vh;
    background:#dfeff3;
    overflow:hidden;
  }
  .side{
    position:absolute;
    left:0;
    top:0;
    bottom:0;
    background:#07595f;
    color:#fff;
    overflow:hidden;
  }
  .logo{
    position:absolute;
    left:15%;
    top:3.0%;
    font-weight:900;
    font-size:34px;
    line-height:.9;
    letter-spacing:-1px;
    white-space:nowrap;
  }
  .logo small{
    display:block;
    font-size:10px;
    margin-top:8px;
    letter-spacing:0;
  }
  .menu{
    position:absolute;
    left:11.5%;
    right:11.5%;
    top:9.2%;
    display:flex;
    flex-direction:column;
    gap:15px;
    font-weight:800;
    font-size:13px;
    white-space:nowrap;
  }
  .menu div{
    height:18px;
    display:flex;
    align-items:center;
  }
  .menu .active{
    height:28px;
    padding-left:13px;
    background:#18a1aa;
    border-radius:4px;
  }
  .switch{
    position:absolute;
    left:16%;
    bottom:10.0%;
    width:54%;
    height:26px;
    border:1px solid rgba(255,255,255,.9);
    border-radius:3px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:10px;
    font-weight:800;
    white-space:nowrap;
  }
  .foot{
    position:absolute;
    left:16%;
    bottom:4.2%;
    font-size:10px;
    font-weight:700;
    line-height:1.45;
    white-space:nowrap;
  }
  .box{
    position:absolute;
    background:#fff;
    border:1px solid #24434a;
    border-radius:3px;
  }

  /* ─── KPIカード 中身 ─── */
  .kpi-inner{
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    width:100%;
    height:100%;
    padding:8px 10px 7px;
    overflow:hidden;
  }
  .kpi-label{
    font-size:11px;
    font-weight:800;
    color:#3a5a62;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    line-height:1.2;
  }
  .kpi-num{
    font-size:28px;
    font-weight:900;
    color:#0a2e35;
    line-height:1;
    text-align:right;
    white-space:nowrap;
  }
  .kpi-num span{
    font-size:12px;
    font-weight:800;
    margin-left:2px;
    color:#3a5a62;
  }
  /* 未処理カードは赤系で注意喚起 */
  #kpi2 .kpi-num{ color:#c0392b; }
  /* 調整ありカードはオレンジ系 */
  #kpi4 .kpi-num{ color:#c07800; }

  /* ─── 右DETAILパネル 中身 ─── */
  .detail-inner{
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }
  .detail-header{
    padding:9px 12px 7px;
    border-bottom:1px solid #c8dde4;
    flex:0 0 auto;
  }
  .detail-header-label{
    font-size:10px;
    font-weight:800;
    color:#6a8a92;
    letter-spacing:.04em;
  }
  .detail-header-name{
    font-size:16px;
    font-weight:900;
    color:#0a2e35;
    margin-top:2px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .detail-body{
    flex:1;
    overflow-y:auto;
    padding:8px 12px 10px;
  }
  .detail-row{
    display:flex;
    align-items:baseline;
    gap:6px;
    min-height:22px;
    border-bottom:1px solid #eef3f5;
    padding:3px 0;
  }
  .detail-row:last-child{
    border-bottom:none;
  }
  .detail-key{
    font-size:10px;
    font-weight:800;
    color:#6a8a92;
    flex:0 0 52px;
    white-space:nowrap;
  }
  .detail-val{
    font-size:12px;
    font-weight:800;
    color:#0a2e35;
    flex:1;
    word-break:break-all;
  }
  /* 状態バッジ */
  .d-badge{
    display:inline-block;
    font-size:11px;
    font-weight:900;
    padding:1px 7px;
    border-radius:3px;
    white-space:nowrap;
  }
  .d-badge.moving { background:#fff2dd; color:#c07800; border:1px solid #f0c060; }
  .d-badge.uninvoiced { background:#fde8e8; color:#b02020; border:1px solid #e8a0a0; }
  .d-badge.unpaid    { background:#fff0e0; color:#b05000; border:1px solid #f0c090; }
  .d-badge.unsettled { background:#fde8f8; color:#801870; border:1px solid #e0a0d8; }
  /* 空状態（案件未選択） */
  .detail-empty{
    width:100%;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    font-size:12px;
    font-weight:800;
    color:#8aacb4;
    line-height:1.8;
    padding:20px;
  }
</style>
</head>
<body>
<div class="stage" id="stage">
  <aside class="side" id="side">
    <div class="logo">スママネ<small>Status Manager</small></div>
    <div class="menu">
      <div class="active">ダッシュボード</div>
      <div>案件入力</div>
      <div>案件一覧</div>
      <div>請求管理</div>
      <div>入金管理</div>
      <div>支払管理</div>
      <div>車両・乗務員管理</div>
      <div>協力業者管理</div>
      <div>マスター管理</div>
      <div>設定</div>
    </div>
    <div class="switch">iPad 表示に切替</div>
    <div class="foot">株式会社〇〇タクシー<br>Ver.1.0.0</div>
  </aside>

  <!-- 検索バー（中身は後で） -->
  <div class="box" id="search"></div>

  <!-- KPI①：本日案件 -->
  <div class="box" id="kpi1">
    <div class="kpi-inner">
      <div class="kpi-label">本日案件</div>
      <div class="kpi-num">12<span>件</span></div>
    </div>
  </div>

  <!-- KPI②：未処理 -->
  <div class="box" id="kpi2">
    <div class="kpi-inner">
      <div class="kpi-label">未処理</div>
      <div class="kpi-num">3<span>件</span></div>
    </div>
  </div>

  <!-- KPI③：本日売上 -->
  <div class="box" id="kpi3">
    <div class="kpi-inner">
      <div class="kpi-label">本日売上</div>
      <div class="kpi-num" style="font-size:19px;">86,400<span>円</span></div>
    </div>
  </div>

  <!-- KPI④：調整あり -->
  <div class="box" id="kpi4">
    <div class="kpi-inner">
      <div class="kpi-label">調整あり</div>
      <div class="kpi-num">2<span>件</span></div>
    </div>
  </div>

  <!-- 中央メインエリア（中身は後で） -->
  <div class="box" id="main"></div>

  <!-- 右DETAIL：仮データ表示 -->
  <div class="box" id="detail">
    <div class="detail-inner">
      <div class="detail-header">
        <div class="detail-header-label">選択中の案件</div>
        <div class="detail-header-name">山田 花子 様</div>
      </div>
      <div class="detail-body">
        <div class="detail-row">
          <div class="detail-key">時間</div>
          <div class="detail-val">09:30 – 10:20</div>
        </div>
        <div class="detail-row">
          <div class="detail-key">患者名</div>
          <div class="detail-val">山田 花子</div>
        </div>
        <div class="detail-row">
          <div class="detail-key">出発</div>
          <div class="detail-val">広島市中区 ○○病院</div>
        </div>
        <div class="detail-row">
          <div class="detail-key">到着</div>
          <div class="detail-val">広島市南区 ○○施設</div>
        </div>
        <div class="detail-row">
          <div class="detail-key">搬送対応</div>
          <div class="detail-val">佐藤介護タクシー</div>
        </div>
        <div class="detail-row">
          <div class="detail-key">状態</div>
          <div class="detail-val"><span class="d-badge moving">搬送中</span></div>
        </div>
        <div class="detail-row">
          <div class="detail-key">特記</div>
          <div class="detail-val">車いす対応</div>
        </div>
        <div class="detail-row">
          <div class="detail-key">請求状態</div>
          <div class="detail-val"><span class="d-badge uninvoiced">未請求</span></div>
        </div>
        <div class="detail-row">
          <div class="detail-key">入金状態</div>
          <div class="detail-val"><span class="d-badge unpaid">未入金</span></div>
        </div>
        <div class="detail-row">
          <div class="detail-key">支払状態</div>
          <div class="detail-val"><span class="d-badge unsettled">未支払</span></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 下部：お知らせ・メモ（中身は後で） -->
  <div class="box" id="memo"></div>

  <!-- 下部：クイック操作（中身は後で） -->
  <div class="box" id="quick"></div>
</div>
<script>
(function(){
  const $ = id => document.getElementById(id);
  const clamp = (v,min,max) => Math.max(min, Math.min(max, v));
  const set = (id, r) => {
    const el = $(id);
    el.style.left = Math.round(r.x) + 'px';
    el.style.top = Math.round(r.y) + 'px';
    el.style.width = Math.round(r.w) + 'px';
    el.style.height = Math.round(r.h) + 'px';
  };

  function layout(){
    const W = window.innerWidth;
    const H = window.innerHeight;

    // 左帯：縮尺対象ではなく、常に画面の上下端まで塗る
    const sideW = clamp(W * 0.193, 190, 264);
    $('side').style.width = Math.round(sideW) + 'px';

    // 右側の基準余白
    const left = sideW + clamp(W * 0.010, 12, 16);
    const rightMargin = clamp(W * 0.012, 12, 18);
    const bottomMargin = clamp(H * 0.026, 16, 22);
    const gap = clamp(W * 0.009, 8, 13);

    // 下部カード群：画面下端を基準にする。高さは守る。
    const bottomH = clamp(H * 0.178, 104, 136);
    const bottomY = H - bottomMargin - bottomH;

    // DETAIL：下部カード群と下端を揃える。幅は狭くしすぎない。
    const detailW = clamp(W * 0.178, 190, 244);
    const detailX = W - rightMargin - detailW;
    const centerRight = detailX - gap;
    const centerW = centerRight - left;

    // 中央大枠：下部カード群の上から逆算。主役なので最後まで守る。
    const mainTop = clamp(H * 0.255, 154, 194);
    const mainBottom = bottomY - gap;
    const mainH = Math.max(220, mainBottom - mainTop);

    // 下部2カード：中央大枠の左右基準に合わせる。
    const memoW = Math.round(centerW * 0.515);
    const quickX = left + memoW + gap;
    const quickW = centerRight - quickX;

    set('main',   {x:left,      y:mainTop, w:centerW, h:mainH});
    set('memo',   {x:left,      y:bottomY, w:memoW,   h:bottomH});
    set('quick',  {x:quickX,    y:bottomY, w:quickW,  h:bottomH});
    set('detail', {x:detailX,   y:mainTop, w:detailW, h:(H - bottomMargin - mainTop)});

    // 検索＋上部4カード：余った上部空間だけで処理。先に小さくなる。
    const headerBottom = mainTop - clamp(H * 0.020, 10, 16);
    const headerTop = clamp(H * 0.014, 8, 14);
    const headerH = Math.max(36, headerBottom - headerTop);

    const kGap = clamp(W * 0.007, 6, 10);
    const kpiH = clamp(headerH * 0.58, 38, 78);
    const kpiY = headerBottom - kpiH;
    const kpiRight = W - rightMargin;

    // 上部4カードは右下端基準。横が足りない場合はここだけ先に縮む。
    const maxKpiW = 142;
    const minKpiW = 52;
    const availableK = kpiRight - (left + centerW * 0.52);
    const kpiW = clamp((availableK - kGap * 3) / 4, minKpiW, maxKpiW);
    const kTotal = kpiW * 4 + kGap * 3;
    const kStart = kpiRight - kTotal;

    set('kpi1', {x:kStart,                    y:kpiY, w:kpiW, h:kpiH});
    set('kpi2', {x:kStart + (kpiW+kGap),      y:kpiY, w:kpiW, h:kpiH});
    set('kpi3', {x:kStart + (kpiW+kGap)*2,    y:kpiY, w:kpiW, h:kpiH});
    set('kpi4', {x:kStart + (kpiW+kGap)*3,    y:kpiY, w:kpiW, h:kpiH});

    const searchW = clamp(centerW * 0.40, 180, 336);
    const searchH = clamp(headerH * 0.28, 22, 32);
    const searchY = headerTop + clamp(headerH * 0.05, 0, 6);
    set('search', {x:left + 4, y:searchY, w:searchW, h:searchH});
  }

  window.addEventListener('resize', layout);
  layout();
})();
</script>
</body>
</html>
