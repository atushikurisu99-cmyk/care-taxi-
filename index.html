<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="format-detection" content="telephone=no">
  <title>介護タクシー管理アプリ Shell v11</title>
  <link rel="stylesheet" href="css/base.css">
</head>
<body>
  <div id="viewport">
    <main id="app-canvas" aria-label="介護タクシー管理アプリ">
      <section class="top-bar" aria-label="上部バー">
        <div class="ipad-status left">2:36　5月12日(火)</div>
        <div class="ipad-status right">…  Wi-Fi  ◎  80% ▰</div>
        <div class="hamburger" aria-hidden="true"><span></span><span></span><span></span></div>
        <div class="main-date">5/10（日）</div>
        <div class="main-time">05:14</div>
        <button class="reserve-button" type="button">＋予約登録</button>
      </section>

      <section id="location-area" class="area location-area" aria-label="LOCATIONエリア">
        <h2>LOCATION</h2>
      </section>

      <section id="detail-area" class="area detail-area" aria-label="DETAILエリア">
        <h2>DETAIL</h2>
      </section>

      <section id="days-area" class="area days-area" aria-label="DAYSエリア">
        <h2>DAYS</h2>
      </section>

      <section id="status-area" class="area status-area" aria-label="STATUSエリア">
        <h2>STATUS</h2>
      </section>
    </main>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
