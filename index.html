<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>介護タクシー管理アプリ</title>
  <link rel="stylesheet" href="./css/reset.css">
  <link rel="stylesheet" href="./css/layout.css">
  <link rel="stylesheet" href="./css/header.css">
  <link rel="stylesheet" href="./css/areas.css">
  <link rel="stylesheet" href="./css/days-status.css">
</head>
<body>
  <div id="app">
    <header class="app-header" aria-label="上部情報帯">
      <div class="header-inner">
        <button class="menu-button" aria-label="メニュー"><span></span><span></span><span></span></button>
        <div class="header-date">5/10（日）</div>
        <div class="header-time">05:14</div>
        <button class="reserve-button">＋予約登録</button>
      </div>
    </header>

    <main class="stage-wrap" aria-label="固定比率UIキャンバス">
      <section class="stage" id="stage">
        <div class="area-label location-label">LOCATION</div>
        <div class="area-label detail-label">DETAIL</div>
        <div class="area-label days-label">DAYS</div>
        <div class="area-label status-label">STATUS</div>

        <div class="area area-location" aria-label="LOCATIONエリア"></div>
        <div class="area area-detail" aria-label="DETAILエリア"></div>
        <div class="area area-days" aria-label="DAYSエリア">
          <div class="days-grid" aria-label="7日カード">
            <article class="day-card">
              <div class="day-date">5/10</div>
              <div class="day-gap"></div>
              <div class="day-line">案件 8</div>
              <div class="day-line">調整 1</div>
              <div class="day-notice">未請求 2</div>
              <div class="day-notice">未入金 1</div>
              <div class="day-notice muted">—</div>
            </article>
            <article class="day-card">
              <div class="day-date">5/11</div>
              <div class="day-gap"></div>
              <div class="day-line">案件 6</div>
              <div class="day-line">調整 0</div>
              <div class="day-notice">確認 1</div>
              <div class="day-notice muted">—</div>
              <div class="day-notice muted">—</div>
            </article>
            <article class="day-card">
              <div class="day-date">5/12</div>
              <div class="day-gap"></div>
              <div class="day-line">案件 9</div>
              <div class="day-line">調整 2</div>
              <div class="day-notice">要調整</div>
              <div class="day-notice">請求前</div>
              <div class="day-notice muted">—</div>
            </article>
            <article class="day-card">
              <div class="day-date">5/13</div>
              <div class="day-gap"></div>
              <div class="day-line">案件 5</div>
              <div class="day-line">調整 0</div>
              <div class="day-notice muted">—</div>
              <div class="day-notice muted">—</div>
              <div class="day-notice muted">—</div>
            </article>
            <article class="day-card">
              <div class="day-date">5/14</div>
              <div class="day-gap"></div>
              <div class="day-line">案件 7</div>
              <div class="day-line">調整 1</div>
              <div class="day-notice">未支払</div>
              <div class="day-notice muted">—</div>
              <div class="day-notice muted">—</div>
            </article>
            <article class="day-card">
              <div class="day-date">5/15</div>
              <div class="day-gap"></div>
              <div class="day-line">案件 4</div>
              <div class="day-line">調整 0</div>
              <div class="day-notice muted">—</div>
              <div class="day-notice muted">—</div>
              <div class="day-notice muted">—</div>
            </article>
            <article class="day-card">
              <div class="day-date">5/16</div>
              <div class="day-gap"></div>
              <div class="day-line">案件 3</div>
              <div class="day-line">調整 0</div>
              <div class="day-notice">仮予約</div>
              <div class="day-notice muted">—</div>
              <div class="day-notice muted">—</div>
            </article>
          </div>
        </div>
        <div class="area area-status" aria-label="STATUSエリア">
          <div class="status-list" aria-label="搬送対応ステータス">
            <div class="status-row"><span class="status-name">広島ケア</span><span class="status-state">待機中</span></div>
            <div class="status-row"><span class="status-name">あおば</span><span class="status-state">向かい中</span></div>
            <div class="status-row"><span class="status-name">みらい</span><span class="status-state">搬送中</span></div>
            <div class="status-row"><span class="status-name">さくら</span><span class="status-state">終了</span></div>
            <div class="status-row"><span class="status-name">ひかり</span><span class="status-state">待機中</span></div>
            <div class="status-row"><span class="status-name">中央</span><span class="status-state">確認中</span></div>
          </div>
        </div>
      </section>
    </main>
  </div>
  <script src="./js/scale.js"></script>
</body>
</html>
