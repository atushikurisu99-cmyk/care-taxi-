<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>介護タクシー管理アプリ</title>
<style>
*{box-sizing:border-box}
html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:#eef2f6;
  color:#172033;
}
button,input,textarea{
  font:inherit;
}
body{
  position:fixed;
  inset:0;
}
.screen{
  width:100vw;
  height:100vh;
  padding:8px;
}
.shell{
  width:100%;
  height:100%;
  border:10px solid #111827;
  border-radius:36px;
  overflow:hidden;
  background:white;
  display:flex;
  flex-direction:column;
  box-shadow:0 20px 60px rgba(0,0,0,.22);
}
.top{
  height:78px;
  background:#2f58a7;
  color:white;
  display:flex;
  align-items:center;
  justify-content:space-between;
</html>
