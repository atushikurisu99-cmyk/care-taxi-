<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>CARE TAXI TRACE V11</title>
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <main class="page">
    <section class="trace-shell" aria-label="介護タクシー管理アプリ">
      <header class="topbar">
        <button class="hamburger" aria-label="メニュー"><span></span><span></span><span></span></button>
        <div class="datetime">5/10（日） 05:14</div>
        <button class="reserve-btn">＋予約登録</button>
      </header>

      <section class="body-area">
        <section class="location-area">
          <h2>LOCATION</h2>
          <div id="timeline-root"></div>
        </section>

        <aside class="detail-area">
          <h2>DETAIL</h2>
          <div class="detail-list">
            <div>時間</div>
            <div>患者名</div>
            <div>出発 → 到着</div>
            <div>担当</div>
            <div>状態</div>
            <div>特記</div>
            <div class="line-text">ーーー</div>
          </div>
        </aside>

        <div class="section-line"></div>

        <section class="days-area">
          <h2>DAYS</h2>
          <div id="days-root"></div>
        </section>

        <section class="status-area">
          <h2>STATUS</h2>
          <div class="status-list">
            <div><b>協力業者 A</b><span>待機</span></div>
            <div><b>協力業者 B</b><span>向かい中</span></div>
            <div><b>協力業者 C</b><span>向かい中</span></div>
            <div><b>協力業者 D</b><span>搬送中</span></div>
            <div><b>協力業者 E</b><span>終了</span></div>
            <div><b>協力業者 F</b><span>終了</span></div>
            <div><b>協力業者 G</b><span>終了</span></div>
          </div>
        </section>
      </section>
    </section>
  </main>

  <script src="js/data.js"></script>
  <script src="js/timeline.js"></script>
  <script src="js/days.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
