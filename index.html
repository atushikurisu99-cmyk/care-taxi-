<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>介護タクシー管理アプリ</title>
  <link rel="stylesheet" href="./css/reset.css">
  <link rel="stylesheet" href="./css/layout.css">
  <link rel="stylesheet" href="./css/header.css">
  <link rel="stylesheet" href="./css/areas.css">
</head>
<body>
  <div id="app">
    <header class="app-header" aria-label="上部情報帯">
      <div class="header-inner">
        <button class="menu-button" aria-label="メニュー"><span></span><span></span><span></span></button>
        <div class="header-date">5/10（日）</div>
        <div class="header-time">05:14</div>
        <button class="reserve-button">＋予約登録</button>
      </div>
    </header>

    <main class="stage-wrap" aria-label="固定比率UIキャンバス">
      <section class="stage" id="stage">
        <div class="area-label location-label">LOCATION</div>
        <div class="area-label detail-label">DETAIL</div>
        <div class="area-label days-label">DAYS</div>
        <div class="area-label status-label">STATUS</div>

        <div class="l-boundary" aria-hidden="true"></div>

        <div class="area area-location" aria-label="LOCATIONエリア"></div>
        <div class="area area-detail" aria-label="DETAILエリア"></div>
        <div class="area area-days" aria-label="DAYSエリア"></div>
        <div class="area area-status" aria-label="STATUSエリア"></div>
      </section>
    </main>
  </div>
  <script src="./js/scale.js"></script>
</body>
</html>
