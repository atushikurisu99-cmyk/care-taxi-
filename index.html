<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PC PDF Big Boxes Menu v5</title>
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#e9f7fa;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif;}
  :root{--base-w:1366;--base-h:663;}
  .stage{position:absolute;left:0;top:0;width:1366px;height:663px;transform-origin:top left;}
  @media (max-width:1365px),(max-height:662px){
    .stage{transform:scale(min(calc(100vw / 1366),calc(100vh / 663)));}
  }
  .nav{position:absolute;left:0;top:0;width:252px;height:560px;background:#07585d;color:#fff;}
  .logo{position:absolute;left:54px;top:28px;font-weight:900;font-size:30px;letter-spacing:-2px;line-height:.9;}
  .logo small{display:block;font-size:10px;letter-spacing:0;line-height:1.1;margin-top:4px;}
  .menu{position:absolute;left:38px;top:86px;width:148px;display:flex;flex-direction:column;gap:14px;font-weight:800;font-size:13px;white-space:nowrap;}
  .menu div{height:18px;line-height:18px;}
  .menu .active{height:28px;line-height:28px;background:#1aa3ad;border-radius:4px;text-align:center;margin-bottom:2px;}
  .switch{position:absolute;left:54px;bottom:66px;width:132px;height:27px;border:1px solid rgba(255,255,255,.85);border-radius:3px;text-align:center;line-height:25px;font-size:11px;font-weight:800;}
  .foot{position:absolute;left:54px;bottom:28px;font-size:10px;font-weight:700;line-height:1.25;}
  .box{position:absolute;background:#fff;border:1px solid #111;border-radius:2px;}
  .search{left:280px;top:10px;width:335px;height:32px;}
  .kpi{top:14px;width:116px;height:66px;}
  .k1{left:760px}.k2{left:888px}.k3{left:1016px}.k4{left:1144px}
  .main{left:278px;top:92px;width:828px;height:344px;}
  .side{left:1118px;top:92px;width:238px;height:468px;}
  .memo{left:278px;top:448px;width:410px;height:112px;}
  .quick{left:700px;top:448px;width:406px;height:112px;}
</style>
</head>
<body>
  <div class="stage">
    <aside class="nav">
      <div class="logo">スママネ<small>Status Manager</small></div>
      <div class="menu">
        <div class="active">ダッシュボード</div>
        <div>案件入力</div>
        <div>案件一覧</div>
        <div>請求管理</div>
        <div>入金管理</div>
        <div>支払管理</div>
        <div>車両・乗務員管理</div>
        <div>協力業者管理</div>
        <div>マスター管理</div>
        <div>設定</div>
      </div>
      <div class="switch">iPad 表示に切替</div>
      <div class="foot">株式会社○○タクシー<br>Ver.1.0.0</div>
    </aside>
    <div class="box search"></div>
    <div class="box kpi k1"></div>
    <div class="box kpi k2"></div>
    <div class="box kpi k3"></div>
    <div class="box kpi k4"></div>
    <div class="box main"></div>
    <div class="box side"></div>
    <div class="box memo"></div>
    <div class="box quick"></div>
  </div>
</body>
</html>
