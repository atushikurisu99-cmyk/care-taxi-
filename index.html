<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>介護タクシー管理アプリ Shell</title>
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/header.css" />
  <link rel="stylesheet" href="css/shell.css" />
</head>
<body>
  <div id="app">
    <header class="top-bar" aria-label="上部バー">
      <div class="device-info">2:36　6月12日(火)</div>
      <button class="menu-button" aria-label="メニュー">☰</button>
      <div class="main-time">5/10（日） 05:14</div>
      <button class="reserve-button">＋予約登録</button>
    </header>

    <main class="white-stage" aria-label="管理画面本体">
      <section class="area area-location" aria-label="LOCATION">
        <h2>LOCATION</h2>
      </section>
      <section class="area area-detail" aria-label="DETAIL">
        <h2>DETAIL</h2>
      </section>
      <section class="area area-days" aria-label="DAYS">
        <h2>DAYS</h2>
      </section>
      <section class="area area-status" aria-label="STATUS">
        <h2>STATUS</h2>
      </section>
      <div class="bottom-safe-space" aria-hidden="true"></div>
    </main>
  </div>
  <script src="js/lock.js"></script>
</body>
</html>
