<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PC PDF Big Boxes Only v1</title>
<style>
  *{box-sizing:border-box}
  html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#dfeff3;
  }
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif;
  }

  /* PDFのアプリ表示範囲だけを、ブラウザ表示領域いっぱいに再現 */
  .stage{
    position:relative;
    width:100vw;
    height:100vh;
    background:#dfeff3;
  }

  .box{
    position:absolute;
    background:#fff;
    border:1px solid #2b4248;
    border-radius:3px;
  }

  .side{
    position:absolute;
    left:0;
    top:0;
    width:19.3%;
    height:100%;
    background:#07555b;
  }

  /* 上部 */
  .search{
    left:20.6%;
    top:1.2%;
    width:24.6%;
    height:4.9%;
  }

  .kpi1{left:59.3%; top:2.0%; width:10.3%; height:12.0%;}
  .kpi2{left:70.2%; top:2.0%; width:9.3%; height:12.0%;}
  .kpi3{left:80.1%; top:2.0%; width:9.3%; height:12.0%;}
  .kpi4{left:90.0%; top:2.0%; width:8.9%; height:12.0%;}

  /* 大箱 */
  .main{
    left:20.35%;
    top:16.7%;
    width:60.1%;
    height:58.3%;
  }

  .detail{
    left:81.35%;
    top:16.7%;
    width:17.8%;
    height:80.5%;
  }

  .memo{
    left:20.35%;
    top:76.35%;
    width:31.3%;
    height:20.9%;
  }

  .quick{
    left:52.6%;
    top:76.35%;
    width:27.9%;
    height:20.9%;
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="side"></div>
    <div class="box search"></div>
    <div class="box kpi1"></div>
    <div class="box kpi2"></div>
    <div class="box kpi3"></div>
    <div class="box kpi4"></div>
    <div class="box main"></div>
    <div class="box detail"></div>
    <div class="box memo"></div>
    <div class="box quick"></div>
  </div>
</body>
</html>
