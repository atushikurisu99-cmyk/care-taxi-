<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PC Big Box Trace v1</title>
<style>
:root{
  --bg:#eaf5f7;
  --nav:#064f57;
  --line:#b8cbd3;
  --box:#ffffff;
  --shadow:0 0 0 1px var(--line) inset;
}
*{box-sizing:border-box;}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:Arial,"Noto Sans JP",sans-serif;}
.stage{
  position:relative;
  width:1024px;
  height:576px;
  margin:0;
  background:var(--bg);
}
.nav{
  position:absolute;
  left:0;
  top:0;
  width:168px;
  height:576px;
  background:var(--nav);
}
.search{
  position:absolute;
  left:182px;
  top:23px;
  width:250px;
  height:22px;
  background:var(--box);
  border:1px solid #202b2f;
}
.title-area{
  position:absolute;
  left:182px;
  top:58px;
  width:390px;
  height:30px;
  background:transparent;
}
.kpi{
  position:absolute;
  top:27px;
  width:86px;
  height:54px;
  background:var(--box);
  box-shadow:var(--shadow);
  border-radius:1px;
}
.kpi.k1{left:574px;}
.kpi.k2{left:671px;}
.kpi.k3{left:768px;}
.kpi.k4{left:865px;}
.case{
  position:absolute;
  left:181px;
  top:96px;
  width:595px;
  height:239px;
  background:var(--box);
  border:2px solid #46545a;
  border-radius:2px;
}
.notice{
  position:absolute;
  left:181px;
  top:342px;
  width:298px;
  height:85px;
  background:var(--box);
  border:2px solid #46545a;
  border-radius:2px;
}
.quick{
  position:absolute;
  left:489px;
  top:342px;
  width:287px;
  height:85px;
  background:var(--box);
  border:2px solid #46545a;
  border-radius:2px;
}
.detail{
  position:absolute;
  left:785px;
  top:96px;
  width:176px;
  height:331px;
  background:var(--box);
  border:2px solid #46545a;
  border-radius:1px;
}
</style>
</head>
<body>
  <div class="stage">
    <div class="nav"></div>
    <div class="search"></div>
    <div class="title-area"></div>
    <div class="kpi k1"></div>
    <div class="kpi k2"></div>
    <div class="kpi k3"></div>
    <div class="kpi k4"></div>
    <div class="case"></div>
    <div class="notice"></div>
    <div class="quick"></div>
    <div class="detail"></div>
  </div>
</body>
</html>
