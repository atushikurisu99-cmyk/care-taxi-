<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="format-detection" content="telephone=no">
  <title>介護タクシー管理アプリ Shell v13</title>
  <link rel="stylesheet" href="css/base.css">
</head>
<body>
  <div id="viewport">
    <main id="app-canvas" aria-label="介護タクシー管理アプリ">
      <section class="top-bar" aria-label="上部バー">
        <div class="hamburger" aria-hidden="true"><span></span><span></span><span></span></div>
        <div class="main-date">5/10（日）</div>
        <div class="main-time">05:14</div>
        <button class="reserve-button" type="button">＋予約登録</button>
      </section>

      <div class="area-label label-location">LOCATION</div>
      <div class="area-label label-detail">DETAIL</div>
      <div class="area-label label-days">DAYS</div>
      <div class="area-label label-status">STATUS</div>

      <section id="location-area" class="area location-area" aria-label="LOCATIONエリア"></section>
      <section id="detail-area" class="area detail-area" aria-label="DETAILエリア"></section>
      <section id="days-area" class="area days-area" aria-label="DAYSエリア"></section>
      <section id="status-area" class="area status-area" aria-label="STATUSエリア"></section>
    </main>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
