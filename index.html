<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Care Taxi UI" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#3568c8" />
  <title>介護タクシー管理UI</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      touch-action: none;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: fixed;
      inset: 0;
      background: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      user-select: none;
      -webkit-user-select: none;
    }

    :root {
      --app-h: 100vh;
      --blue: #3568c8;

      --status-h: 24px;
      --header-h: 112px;

      --content-x: 58px;
      --content-top: 152px;
      --content-bottom: 18px;

      --right-w: 288px;
      --right-gap: 38px;

      --bottom-h: 142px;
      --bottom-gap: 32px;
    }

    .app {
      position: fixed;
      left: 0;
      top: 0;
      width: 100vw;
      height: var(--app-h);
      overflow: hidden;
      background: #ffffff;
    }

    .header {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      height: var(--header-h);
      background: var(--blue);
      overflow: hidden;
    }

    .menu {
      position: absolute;
      left: 58px;
      top: calc(var(--status-h) + 22px);
      width: 50px;
      height: 42px;
    }

    .menu span {
      display: block;
      width: 100%;
      height: 5px;
      margin-bottom: 10px;
      border-radius: 999px;
      background: #ffffff;
    }

    .date {
      position: absolute;
      left: 126px;
      top: calc(var(--status-h) + 12px);
      height: 70px;
      display: flex;
      align-items: center;
      color: #ffffff;
      font-size: 36px;
      line-height: 1;
      white-space: nowrap;
    }

    .reserve {
      position: absolute;
      right: 58px;
      top: calc(var(--status-h) + 18px);
      width: 112px;
      height: 44px;
      border-radius: 9px;
      background: #ffffff;
      color: #2d5fb8;
      font-size: 17px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
      border: 1px solid rgba(0,0,0,.25);
    }

    .content-shell {
      position: absolute;
      left: var(--content-x);
      right: var(--content-x);
      top: var(--content-top);
      bottom: var(--content-bottom);
      overflow: hidden;
      background: #ffffff;
    }

    .main {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      bottom: calc(var(--bottom-h) + var(--bottom-gap));
      overflow: hidden;
    }

    .timeline {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      right: calc(var(--right-w) + var(--right-gap));
      background: #f8f8f8;
      border: 1px solid rgba(0,0,0,.5);
      overflow: hidden;
    }

    .detail {
      position: absolute;
      top: 0;
      right: 0;
      width: var(--right-w);
      height: 100%;
      background: #f8f8f8;
      border: 1px solid rgba(0,0,0,.5);
      overflow: hidden;
    }

    .detail-line {
      width: calc(100% - 42px);
      height: 1px;
      margin-left: 21px;
      background: rgba(0,0,0,.18);
    }

    .detail-line.a { margin-top: 110px; }
    .detail-line.b,
    .detail-line.c,
    .detail-line.d { margin-top: 54px; }
    .detail-line.e,
    .detail-line.f { margin-top: 88px; }

    .bottom {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: var(--bottom-h);
      overflow: hidden;
    }

    .days {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      right: calc(var(--right-w) + var(--right-gap));
      background: #f8f8f8;
      border: 1px solid rgba(0,0,0,.5);
      overflow: hidden;
    }

    .status {
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: var(--right-w);
      background: #f8f8f8;
      border: 1px solid rgba(0,0,0,.5);
      overflow: hidden;
    }

    .head {
      height: 40px;
      border-bottom: 1px solid rgba(0,0,0,.25);
    }

    .days-grid {
      height: calc(100% - 40px);
      display: grid;
      grid-template-columns: repeat(7, 1fr);
    }

    .day {
      position: relative;
      border-right: 1px solid rgba(0,0,0,.13);
    }

    .day:last-child {
      border-right: none;
    }

    .day::before {
      content: "";
      position: absolute;
      left: 20px;
      right: 20px;
      top: 20px;
      height: 24px;
      background: #dce6ff;
      border: 1px solid rgba(0,0,0,.45);
      border-radius: 5px;
    }

    .day::after {
      content: "";
      position: absolute;
      left: 20px;
      right: 40px;
      top: 58px;
      height: 24px;
      background: #e8f1df;
      border: 1px solid rgba(0,0,0,.45);
      border-radius: 5px;
    }

    .status-row {
      position: relative;
      height: calc((100% - 40px) / 3);
      border-bottom: 1px solid rgba(0,0,0,.13);
    }

    .status-row:last-child {
      border-bottom: none;
    }

    .status-row::before {
      content: "";
      position: absolute;
      left: 22px;
      top: 50%;
      width: 122px;
      height: 24px;
      transform: translateY(-50%);
      background: #dce6ff;
      border: 1px solid rgba(0,0,0,.45);
      border-radius: 5px;
    }

    .status-row::after {
      content: "";
      position: absolute;
      right: 20px;
      top: 50%;
      width: 104px;
      height: 24px;
      transform: translateY(-50%);
      background: #e8f1df;
      border: 1px solid rgba(0,0,0,.45);
      border-radius: 5px;
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="header">
      <div class="menu">
        <span></span>
        <span></span>
        <span></span>
      </div>

      <div class="date">4/29（火）14:26</div>
      <div class="reserve">＋予約登録</div>
    </div>

    <div class="content-shell">
      <div class="main">
        <div class="timeline"></div>

        <div class="detail">
          <div class="detail-line a"></div>
          <div class="detail-line b"></div>
          <div class="detail-line c"></div>
          <div class="detail-line d"></div>
          <div class="detail-line e"></div>
          <div class="detail-line f"></div>
        </div>
      </div>

      <div class="bottom">
        <div class="days">
          <div class="head"></div>
          <div class="days-grid">
            <div class="day"></div>
            <div class="day"></div>
            <div class="day"></div>
            <div class="day"></div>
            <div class="day"></div>
            <div class="day"></div>
            <div class="day"></div>
          </div>
        </div>

        <div class="status">
          <div class="head"></div>
          <div class="status-row"></div>
          <div class="status-row"></div>
          <div class="status-row"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    function lockSize() {
      document.documentElement.style.setProperty("--app-h", window.innerHeight + "px");
      window.scrollTo(0, 0);
    }

    function stopEvent(event) {
      event.preventDefault();
      event.stopPropagation();
      return false;
    }

    lockSize();

    window.addEventListener("resize", lockSize, { passive: false });
    window.addEventListener("orientationchange", lockSize, { passive: false });
    window.addEventListener("scroll", lockSize, { passive: false });

    document.addEventListener("touchmove", stopEvent, { passive: false });
    document.addEventListener("gesturestart", stopEvent, { passive: false });
    document.addEventListener("gesturechange", stopEvent, { passive: false });
    document.addEventListener("gestureend", stopEvent, { passive: false });
    document.addEventListener("dragstart", stopEvent, { passive: false });
  </script>
</body>
</html>
