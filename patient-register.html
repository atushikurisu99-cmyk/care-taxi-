<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>患者登録</title>
<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:#eef2f5;
  padding:40px;
}
.card{
  background:white;
  border-radius:24px;
  padding:30px;
}
.title{
  font-size:40px;
  font-weight:950;
  margin-bottom:20px;
}
.input{
  width:100%;
  height:62px;
  margin-bottom:18px;
  background:#eef0f4;
  border:0;
  padding:0 16px;
  font-size:24px;
  font-weight:900;
}
.save{
  width:100%;
  height:72px;
  border:0;
  background:#9ccfa4;
  color:white;
  font-size:36px;
  font-weight:950;
}
</style>
</head>
<body>
<div class="card">
  <div class="title">患者登録</div>

  <input id="name" class="input" placeholder="患者名">
  <input id="kana" class="input" placeholder="ふりがな">
  <input id="tel" class="input" placeholder="電話番号">

  <button class="save" onclick="savePatient()">患者登録</button>
</div>

<script>
function savePatient(){
  const patients=JSON.parse(localStorage.getItem('patients')||'[]');

  patients.push({
    id:Date.now(),
    name:document.getElementById('name').value,
    kana:document.getElementById('kana').value,
    tel:document.getElementById('tel').value
  });

  localStorage.setItem('patients',JSON.stringify(patients));

  location.href='settings.html';
}
</script>
</body>
</html>
