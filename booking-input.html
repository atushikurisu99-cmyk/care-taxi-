<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>予約入力</title>
<style>
body{margin:0;font-family:sans-serif;background:#eef2f5}
.wrap{padding:20px}
input{width:100%;height:60px;margin-bottom:10px;font-size:20px}
button{height:60px;width:100%;font-size:20px;font-weight:900}
</style>
</head>
<body>

<div class="wrap">
  <button onclick="back()">←戻る</button>

  <input id="name" placeholder="名前">
  <input id="date" type="date">
  <input id="time" type="time">

  <button onclick="save()">保存</button>
</div>

<script>
function back(){
  location.href="index.html"
}

function save(){
  const now=new Date()

  const booking={
    id:Date.now(),
    patientName:document.getElementById("name").value,
    useDate:document.getElementById("date").value,
    useTime:document.getElementById("time").value,
    createdAt:now.toISOString(),
    createdTime:now.getHours()+":"+String(now.getMinutes()).padStart(2,"0"),
    status:"temporary"
  }

  const list=JSON.parse(localStorage.getItem("bookings")||"[]")
  list.unshift(booking)
  localStorage.setItem("bookings",JSON.stringify(list))

  location.href="index.html"
}
</script>

</body>
</html>
