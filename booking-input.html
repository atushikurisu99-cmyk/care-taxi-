<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>予約入力</title>
<style>
*{box-sizing:border-box}
html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:#eef2f5;
}
body{padding:8px}
.shell{
  width:100%;
  height:100%;
  border:10px solid #111827;
  border-radius:36px;
  overflow:hidden;
  background:white;
  display:flex;
  flex-direction:column;
}
.top{
  height:78px;
  background:#2f58a7;
  color:white;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 20px;
}
.top-left{
  display:flex;
  align-items:center;
  gap:18px;
  font-size:28px;
  font-weight:950;
}
.menu{
  width:56px;
  height:56px;
  border-radius:16px;
  border:0;
  background:white;
  color:#2f58a7;
  font-size:30px;
}
.back{
  border:0;
  background:white;
  color:#2f58a7;
  border-radius:12px;
  padding:12px 18px;
  font-size:22px;
  font-weight:950;
}
.content{
  flex:1 1 auto;
  padding:28px;
  overflow:hidden;
}
.title-row{
  display:flex;
  align-items:center;
  gap:24px;
  margin-bottom:18px;
}
.title{
  font-size:42px;
  font-weight:950;
</html>
